<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Tracker & Summary Dashboard</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load Babel to translate JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Small fix for fade-in animation since we don't have tailwind-animate plugin loaded */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- This script tag type="text/babel" tells Babel to translate our React code -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          LayoutDashboard, CheckSquare, Wrench, FileText, Target, Plus, 
          Trash2, Copy, CheckCircle2, Circle, Briefcase, ExternalLink, 
          Clock, PieChart, CalendarDays, Flag, Battery, AlignLeft, ListTodo,
          Heart, BookOpen, Activity, History, Edit3
        } from 'https://esm.sh/lucide-react@0.344.0';

        // --- CONSTANTS ---
        const STRATEGIC_GOALS = [
          'New Business',
          'Retention',
          'Process Optimization',
          'Client Work',
          'People Management'
        ];

        // Helper to get Monday of the week for a given date
        const getMonday = (dateString) => {
          const date = new Date(dateString);
          const day = date.getDay();
          const diff = date.getDate() - day + (day === 0 ? -6 : 1); // Adjust for Sunday
          const monday = new Date(date.setDate(diff));
          monday.setHours(0,0,0,0);
          return monday.toISOString().split('T')[0];
        };

        // Helper to load initial data from Local Storage
        const loadLocalData = (key, defaultValue) => {
          try {
            const saved = localStorage.getItem(key);
            if (saved) {
              return JSON.parse(saved);
            }
          } catch (e) {
            console.error(`Error loading ${key} from local storage`, e);
          }
          return defaultValue;
        };

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          
          // --- APP STATE (Initialized from Local Storage) ---
          const [tasks, setTasks] = useState(() => loadLocalData('work_os_tasks', []));
          const [tools, setTools] = useState(() => loadLocalData('work_os_tools', []));
          const [notes, setNotes] = useState(() => loadLocalData('work_os_notes', []));
          const [meetings, setMeetings] = useState(() => loadLocalData('work_os_meetings', []));
          const [teamLove, setTeamLove] = useState(() => loadLocalData('work_os_team_love', []));
          const [documents, setDocuments] = useState(() => loadLocalData('work_os_documents', []));

          // --- FORM STATES ---
          const [newTask, setNewTask] = useState({ title: '', goal: '', priority: 'Medium', duration: '' });
          const [newTool, setNewTool] = useState({ title: '', description: '', url: '', goal: '' });
          const [newNote, setNewNote] = useState('');
          const [newMeeting, setNewMeeting] = useState({ title: '', date: new Date().toISOString().split('T')[0], duration: '', notes: '', actionItems: '' });
          const [newTeamLove, setNewTeamLove] = useState({ date: new Date().toISOString().split('T')[0], sender: '', message: '' });
          const [newDocument, setNewDocument] = useState({ title: '', url: '', description: '' });

          // State for editing an existing meeting
          const [editingMeetingId, setEditingMeetingId] = useState(null);
          const [editMeetingForm, setEditMeetingForm] = useState({ notes: '', actionItems: '' });

          // --- LOCAL STORAGE SYNC (Saves automatically when data changes) ---
          useEffect(() => {
            localStorage.setItem('work_os_tasks', JSON.stringify(tasks));
          }, [tasks]);

          useEffect(() => {
            localStorage.setItem('work_os_tools', JSON.stringify(tools));
          }, [tools]);

          useEffect(() => {
            localStorage.setItem('work_os_notes', JSON.stringify(notes));
          }, [notes]);

          useEffect(() => {
            localStorage.setItem('work_os_meetings', JSON.stringify(meetings));
          }, [meetings]);

          useEffect(() => {
            localStorage.setItem('work_os_team_love', JSON.stringify(teamLove));
          }, [teamLove]);

          useEffect(() => {
            localStorage.setItem('work_os_documents', JSON.stringify(documents));
          }, [documents]);

          // --- DATA HANDLERS ---
          const handleAddTask = (e) => {
            e.preventDefault();
            if (!newTask.title) return;
            const task = { 
              id: Date.now().toString(), 
              title: newTask.title, 
              status: 'Todo', 
              goal: newTask.goal, 
              priority: newTask.priority,
              duration: Number(newTask.duration) || 0,
              dateCreated: new Date().toISOString(),
              dateCompleted: null 
            };
            setTasks(prev => [task, ...prev]);
            setNewTask({ title: '', goal: '', priority: 'Medium', duration: '' });
          };

          const toggleTaskStatus = (taskToToggle) => {
            setTasks(prev => prev.map(task => {
              if (task.id === taskToToggle.id) {
                const isCompleting = task.status === 'Todo';
                return { 
                  ...task, 
                  status: isCompleting ? 'Done' : 'Todo', 
                  dateCompleted: isCompleting ? new Date().toISOString() : null 
                };
              }
              return task;
            }));
          };

          const deleteTask = (id) => setTasks(prev => prev.filter(t => t.id !== id));

          const handleAddTool = (e) => {
            e.preventDefault();
            if (!newTool.title) return;
            const tool = {
              id: Date.now().toString(),
              ...newTool,
              dateCreated: new Date().toISOString()
            };
            setTools(prev => [tool, ...prev]);
            setNewTool({ title: '', description: '', url: '', goal: '' });
          };

          const deleteTool = (id) => setTools(prev => prev.filter(t => t.id !== id));

          const handleAddNote = (e) => {
            e.preventDefault();
            if (!newNote) return;
            const note = {
              id: Date.now().toString(),
              content: newNote,
              dateCreated: new Date().toISOString()
            };
            setNotes(prev => [note, ...prev]);
            setNewNote('');
          };

          const deleteNote = (id) => setNotes(prev => prev.filter(n => n.id !== id));

          const handleAddMeeting = (e) => {
            e.preventDefault();
            if (!newMeeting.title || !newMeeting.duration) return;
            
            const meetingId = Date.now().toString();
            
            // Extract action items and generate Tasks automatically
            const actions = newMeeting.actionItems.split('\n').map(a => a.trim()).filter(a => a.length > 0);
            const generatedTasks = actions.map((action, idx) => ({
              id: meetingId + '-' + idx,
              title: action,
              status: 'Todo',
              goal: '',
              priority: 'Medium',
              duration: 15, // Default 15 mins for auto-generated tasks
              dateCreated: new Date().toISOString(),
              dateCompleted: null
            }));
            
            if (generatedTasks.length > 0) {
              setTasks(prev => [...generatedTasks, ...prev]);
            }

            const meeting = {
              id: meetingId,
              title: newMeeting.title,
              date: newMeeting.date,
              duration: Number(newMeeting.duration),
              notes: newMeeting.notes,
              actionItems: actions,
              dateCreated: new Date().toISOString()
            };
            setMeetings(prev => [meeting, ...prev]);
            setNewMeeting({ title: '', date: new Date().toISOString().split('T')[0], duration: '', notes: '', actionItems: '' });
          };

          const deleteMeeting = (id) => setMeetings(prev => prev.filter(m => m.id !== id));

          const startEditingMeeting = (meeting) => {
            setEditingMeetingId(meeting.id);
            setEditMeetingForm({ notes: meeting.notes || '', actionItems: '' });
          };

          const saveMeetingEdits = (id) => {
            const meeting = meetings.find(m => m.id === id);
            if (!meeting) return;

            const actions = editMeetingForm.actionItems.split('\n').map(a => a.trim()).filter(a => a.length > 0);
            
            if (actions.length > 0) {
              const generatedTasks = actions.map((action, idx) => ({
                id: Date.now().toString() + '-' + idx,
                title: action,
                status: 'Todo',
                goal: '',
                priority: 'Medium',
                duration: 15,
                dateCreated: new Date().toISOString(),
                dateCompleted: null
              }));
              setTasks(prev => [...generatedTasks, ...prev]);
            }

            const updatedMeeting = {
              ...meeting,
              notes: editMeetingForm.notes,
              actionItems: [...(meeting.actionItems || []), ...actions]
            };

            setMeetings(prev => prev.map(m => m.id === id ? updatedMeeting : m));
            setEditingMeetingId(null);
            setEditMeetingForm({ notes: '', actionItems: '' });
          };

          const handleAddTeamLove = (e) => {
            e.preventDefault();
            if (!newTeamLove.message) return;
            const item = {
              id: Date.now().toString(),
              ...newTeamLove,
              dateCreated: new Date().toISOString()
            };
            setTeamLove(prev => [item, ...prev]);
            setNewTeamLove({ date: new Date().toISOString().split('T')[0], sender: '', message: '' });
          };

          const deleteTeamLove = (id) => setTeamLove(prev => prev.filter(i => i.id !== id));

          const handleAddDocument = (e) => {
            e.preventDefault();
            if (!newDocument.title) return;
            const docItem = {
              id: Date.now().toString(),
              ...newDocument,
              dateCreated: new Date().toISOString()
            };
            setDocuments(prev => [docItem, ...prev]);
            setNewDocument({ title: '', url: '', description: '' });
          };

          const deleteDocument = (id) => setDocuments(prev => prev.filter(i => i.id !== id));

          // --- SORTED DATA FOR DISPLAY ---
          const sortedMeetings = useMemo(() => {
            return [...meetings].sort((a, b) => new Date(b.date) - new Date(a.date));
          }, [meetings]);

          // --- DERIVED STATS & CAPACITY SUMMARY ---
          const capacityStats = useMemo(() => {
            const now = new Date();
            const dayOfWeek = now.getDay();
            const distanceToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
            const monday = new Date(now);
            monday.setDate(now.getDate() - distanceToMonday);
            monday.setHours(0, 0, 0, 0);
            
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            sunday.setHours(23, 59, 59, 999);

            const thisWeekMeetings = meetings.filter(m => {
              const mDate = new Date(m.date);
              return mDate >= monday && mDate <= sunday;
            });
            
            const meetingMins = thisWeekMeetings.reduce((acc, m) => acc + (Number(m.duration) || 0), 0);
            
            const thisWeekTaskMins = tasks.filter(t => {
              if (t.status === 'Todo') return true;
              if (t.status === 'Done' && t.dateCompleted) {
                const cDate = new Date(t.dateCompleted);
                return cDate >= monday && cDate <= sunday;
              }
              return false;
            }).reduce((acc, t) => acc + (Number(t.duration) || 0), 0);

            const totalCapacityHours = 40;
            const meetingHours = meetingMins / 60;
            const taskHours = thisWeekTaskMins / 60;
            const remainingHours = totalCapacityHours - meetingHours - taskHours;

            return {
              meetingHours: meetingHours.toFixed(1),
              taskHours: taskHours.toFixed(1),
              remainingHours: remainingHours.toFixed(1)
            };
          }, [meetings, tasks]);

          const historicalCapacity = useMemo(() => {
            const weeks = {};

            meetings.forEach(m => {
              if (!m.date) return;
              const week = getMonday(m.date);
              if (!weeks[week]) weeks[week] = { meetingMins: 0, taskMins: 0 };
              weeks[week].meetingMins += (Number(m.duration) || 0);
            });

            tasks.forEach(t => {
              let week;
              if (t.status === 'Done' && t.dateCompleted) {
                week = getMonday(t.dateCompleted);
              } else if (t.status === 'Todo') {
                week = getMonday(new Date()); 
              } else {
                return;
              }
              
              if (!weeks[week]) weeks[week] = { meetingMins: 0, taskMins: 0 };
              weeks[week].taskMins += (Number(t.duration) || 0);
            });

            return Object.entries(weeks).map(([weekStart, data]) => {
              const meetingHours = data.meetingMins / 60;
              const taskHours = data.taskMins / 60;
              const remainingHours = 40 - meetingHours - taskHours;
              return {
                weekStart,
                meetingHours: meetingHours.toFixed(1),
                taskHours: taskHours.toFixed(1),
                remainingHours: remainingHours.toFixed(1)
              };
            }).sort((a, b) => new Date(b.weekStart) - new Date(a.weekStart));
          }, [meetings, tasks]);

          const goalStats = useMemo(() => {
            const stats = STRATEGIC_GOALS.reduce((acc, goal) => {
                acc[goal] = { spent: 0, planned: 0, count: 0 };
                return acc;
            }, {});
            stats['Unassigned'] = { spent: 0, planned: 0, count: 0 };

            tasks.forEach(t => {
                const goalKey = t.goal || 'Unassigned';
                if (!stats[goalKey]) stats[goalKey] = { spent: 0, planned: 0, count: 0 };
                
                stats[goalKey].count += 1;
                if (t.status === 'Done') {
                    stats[goalKey].spent += (Number(t.duration) || 0);
                } else {
                    stats[goalKey].planned += (Number(t.duration) || 0);
                }
            });

            return Object.entries(stats).map(([goal, data]) => ({
                goal,
                spentHours: (data.spent / 60).toFixed(1),
                plannedHours: (data.planned / 60).toFixed(1),
                totalHours: ((data.spent + data.planned) / 60).toFixed(1),
                count: data.count
            })).filter(g => g.count > 0 || g.goal !== 'Unassigned')
               .sort((a, b) => Number(b.totalHours) - Number(a.totalHours));
          }, [tasks]);

          const meetingStats = useMemo(() => {
            if (meetings.length === 0) return { totalHours: 0, avgWeeklyHours: 0, percentOfWeek: 0 };
            
            const totalMinutes = meetings.reduce((acc, m) => acc + (Number(m.duration) || 0), 0);
            const totalHours = totalMinutes / 60;

            const earliestMeeting = meetings.reduce((earliest, m) => {
              const d = new Date(m.date);
              return d < earliest ? d : earliest;
            }, new Date());

            const daysActive = Math.max(1, (Date.now() - earliestMeeting.getTime()) / (1000 * 60 * 60 * 24));
            const weeksActive = Math.max(1, daysActive / 7);
            
            const avgWeeklyHours = totalHours / weeksActive;
            const percentOfWeek = (avgWeeklyHours / 40) * 100;

            return {
              totalHours: totalHours.toFixed(1),
              avgWeeklyHours: avgWeeklyHours.toFixed(1),
              percentOfWeek: percentOfWeek.toFixed(1)
            };
          }, [meetings]);

          const weeklySummary = useMemo(() => {
            const oneWeekAgo = new Date();
            oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);

            const completedTasks = tasks.filter(t => t.status === 'Done' && new Date(t.dateCompleted) >= oneWeekAgo);
            const recentTools = tools.filter(t => new Date(t.dateCreated) >= oneWeekAgo);
            const weeklyMeetings = meetings.filter(m => new Date(m.date) >= oneWeekAgo);
            const weeklyMeetingHours = (weeklyMeetings.reduce((acc, m) => acc + Number(m.duration), 0) / 60).toFixed(1);

            let summaryText = `Weekly Summary (${new Date().toLocaleDateString()})\n\n`;
            
            summaryText += `✅ Tasks Completed (${completedTasks.length}):\n`;
            if (completedTasks.length === 0) summaryText += `  - No tasks completed this week.\n`;
            completedTasks.forEach(t => {
              const goalText = t.goal ? ` [${t.goal}]` : '';
              summaryText += `  - ${t.title}${goalText}\n`;
            });

            summaryText += `\n🛠️ Tools/Assets Created (${recentTools.length}):\n`;
            if (recentTools.length === 0) summaryText += `  - No new tools created this week.\n`;
            recentTools.forEach(t => {
              const goalText = t.goal ? ` [${t.goal}]` : '';
              summaryText += `  - ${t.title}: ${t.description}${goalText}\n`;
            });

            summaryText += `\n📅 Time in Meetings This Week: ${weeklyMeetingHours} hours\n`;

            return summaryText;
          }, [tasks, tools, meetings]);

          const copyToClipboard = () => {
            navigator.clipboard.writeText(weeklySummary).catch(err => {
              const textArea = document.createElement("textarea");
              textArea.value = weeklySummary;
              document.body.appendChild(textArea);
              textArea.select();
              try { document.execCommand('copy'); } catch (e) {}
              document.body.removeChild(textArea);
            });
          };

          // --- RENDERERS ---
          const renderDashboard = () => (
            <div className="space-y-8 animate-in">
              {/* Weekly Capacity Card */}
              <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm mb-4">
                <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2 mb-4">
                  <Battery size={20} className="text-blue-500" /> This Week's Capacity (40h)
                </h3>
                <div className="w-full bg-gray-100 rounded-full h-4 mb-3 flex overflow-hidden">
                  <div className="bg-indigo-500 h-4 transition-all" style={{ width: `${(capacityStats.meetingHours / 40) * 100}%` }} title="Meetings"></div>
                  <div className="bg-blue-500 h-4 transition-all" style={{ width: `${(capacityStats.taskHours / 40) * 100}%` }} title="Tasks"></div>
                </div>
                <div className="flex justify-between text-sm text-gray-600 font-medium">
                  <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-indigo-500"></span> Meetings: {capacityStats.meetingHours}h</span>
                  <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-blue-500"></span> Tasks: {capacityStats.taskHours}h</span>
                  <span className={`font-bold ${capacityStats.remainingHours < 0 ? 'text-red-500' : 'text-emerald-600'}`}>
                    Remaining: {capacityStats.remainingHours}h
                  </span>
                </div>
              </div>

              {tools.length > 0 && (
                <div className="bg-white p-5 rounded-xl border border-gray-100 shadow-sm">
                  <h3 className="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                    <Wrench size={16} /> My Tools
                  </h3>
                  <div className="flex flex-wrap gap-3">
                    {tools.map(tool => (
                      tool.url ? (
                        <a 
                          key={tool.id} 
                          href={tool.url.startsWith('http') ? tool.url : `https://${tool.url}`}
                          target="_blank" 
                          rel="noopener noreferrer"
                          className="flex items-center gap-2 px-4 py-2 bg-slate-900 text-white rounded-lg hover:bg-slate-800 transition-colors text-sm font-medium shadow-sm"
                        >
                          {tool.title} <ExternalLink size={14} className="opacity-70" />
                        </a>
                      ) : (
                        <span key={tool.id} className="flex items-center gap-2 px-4 py-2 bg-gray-100 text-gray-600 rounded-lg text-sm font-medium cursor-default">
                          {tool.title}
                        </span>
                      )
                    ))}
                  </div>
                </div>
              )}

              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm flex items-center space-x-4">
                  <div className="p-3 bg-blue-50 text-blue-600 rounded-lg"><CheckSquare size={24} /></div>
                  <div>
                    <p className="text-sm text-gray-500 font-medium">Pending Tasks</p>
                    <p className="text-2xl font-bold text-gray-800">{tasks.filter(t => t.status === 'Todo').length}</p>
                  </div>
                </div>
                <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm flex items-center space-x-4">
                  <div className="p-3 bg-emerald-50 text-emerald-600 rounded-lg"><Clock size={24} /></div>
                  <div>
                    <p className="text-sm text-gray-500 font-medium">Avg Mtg Hrs/Week</p>
                    <p className="text-2xl font-bold text-gray-800">{meetingStats.avgWeeklyHours}h</p>
                  </div>
                </div>
                <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm flex items-center space-x-4">
                  <div className="p-3 bg-purple-50 text-purple-600 rounded-lg"><PieChart size={24} /></div>
                  <div>
                    <p className="text-sm text-gray-500 font-medium">% of 40h Week</p>
                    <p className="text-2xl font-bold text-gray-800">{meetingStats.percentOfWeek}%</p>
                  </div>
                </div>
              </div>

              <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                    <FileText size={20} className="text-gray-500" /> Auto-Generated Weekly Summary
                  </h3>
                  <button 
                    onClick={copyToClipboard}
                    className="flex items-center gap-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition-colors text-sm font-medium"
                  >
                    <Copy size={16} /> Copy to Clipboard
                  </button>
                </div>
                <textarea 
                  readOnly 
                  value={weeklySummary}
                  className="w-full h-64 p-4 bg-gray-50 border border-gray-200 rounded-lg text-sm font-mono text-gray-700 resize-none focus:outline-none"
                />
              </div>
            </div>
          );

          const getPriorityStyles = (priority) => {
            switch(priority) {
              case 'High': return 'bg-red-50 text-red-600 border-red-100';
              case 'Medium': return 'bg-amber-50 text-amber-600 border-amber-100';
              case 'Low': return 'bg-slate-50 text-slate-600 border-slate-100';
              default: return 'bg-gray-50 text-gray-600 border-gray-100';
            }
          };

          const renderTasks = () => (
            <div className="space-y-6 animate-in">
              <form onSubmit={handleAddTask} className="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col md:flex-row gap-3">
                <input 
                  type="text" 
                  placeholder="What needs to be done?" 
                  className="flex-1 p-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500"
                  value={newTask.title}
                  onChange={e => setNewTask({...newTask, title: e.target.value})}
                />
                <div className="flex gap-3 md:w-auto w-full">
                  <div className="relative flex-1 md:flex-none">
                    <input 
                      type="number" 
                      placeholder="Mins" 
                      className="w-full md:w-24 p-2 pr-8 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-gray-700 bg-white"
                      value={newTask.duration}
                      onChange={e => setNewTask({...newTask, duration: e.target.value})}
                    />
                    <span className="absolute right-3 top-2.5 text-gray-400 text-sm">m</span>
                  </div>
                  <select 
                    className="flex-1 md:flex-none p-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-gray-700 bg-white"
                    value={newTask.priority}
                    onChange={e => setNewTask({...newTask, priority: e.target.value})}
                  >
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                  </select>
                  <select 
                    className="flex-1 md:flex-none p-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-gray-700 bg-white"
                    value={newTask.goal}
                    onChange={e => setNewTask({...newTask, goal: e.target.value})}
                  >
                    <option value="">Select Goal</option>
                    {STRATEGIC_GOALS.map(g => <option key={g} value={g}>{g}</option>)}
                  </select>
                </div>
                <button type="submit" className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg flex items-center justify-center gap-2 font-medium transition-colors">
                  <Plus size={18} /> Add
                </button>
              </form>

              <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                <div className="p-4 border-b border-gray-100 bg-gray-50 font-medium text-gray-600">Active Tasks</div>
                <ul className="divide-y divide-gray-100">
                  {tasks.filter(t => t.status === 'Todo').length === 0 && (
                    <li className="p-6 text-center text-gray-400">No active tasks. You're all caught up!</li>
                  )}

                  onChange={e => setNewNote(e.target.value)}
                />
                <div className="flex justify-end">
                  <button type="submit" className="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white rounded-lg flex items-center gap-2 font-medium transition-colors">
                    <Plus size={18} /> Save Note
                  </button>
                </div>
              </form>

              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {notes.length === 0 && (
                  <div className="col-span-full p-8 text-center text-gray-500 bg-white rounded-xl border border-gray-100 border-dashed">
                    No notes yet.
                  </div>
                )}
                {notes.map(note => (
                  <div key={note.id} className="bg-[#fffdf2] p-5 rounded-xl border border-amber-100 shadow-sm group relative">
                    <button onClick={() => deleteNote(note.id)} className="absolute top-3 right-3 text-amber-200 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity">
                      <Trash2 size={16} />
                    </button>
                    <p className="text-gray-800 whitespace-pre-wrap pr-4 text-sm">{note.content}</p>
                    <div className="mt-4 pt-3 border-t border-amber-200/50 text-xs text-amber-600/60 font-medium">
                      {new Date(note.dateCreated).toLocaleDateString()}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );

          return (
            <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row font-sans">
              <aside className="w-full md:w-64 bg-white border-r border-gray-200 md:min-h-screen flex flex-col">
                <div className="p-6 border-b border-gray-100 flex items-center gap-3">
                  <div className="p-2 bg-slate-900 rounded-lg text-white">
                    <Briefcase size={20} />
                  </div>
                  <h1 className="font-bold text-xl text-slate-900">Work OS</h1>
                </div>
                <nav className="flex-1 p-4 space-y-1">
                  {[
                    { id: 'dashboard', label: 'Dashboard & Summary', icon: LayoutDashboard },
                    { id: 'tasks', label: 'Tasks & To-dos', icon: CheckSquare },
                    { id: 'meetings', label: 'Meetings & Time', icon: Clock },
                    { id: 'insights', label: 'Insights & Capacity', icon: Activity },
                    { id: 'documents', label: 'Important Docs', icon: BookOpen },
                    { id: 'tools', label: 'Tool Portfolio', icon: Wrench },
                    { id: 'notes', label: 'Information Log', icon: FileText },
                    { id: 'team-love', label: 'Team Love', icon: Heart },
                  ].map((item) => {
                    const Icon = item.icon;
                    const isActive = activeTab === item.id;
                    return (
                      <button
                        key={item.id}
                        onClick={() => setActiveTab(item.id)}
                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-sm ${
                          isActive 
                            ? 'bg-slate-900 text-white shadow-md' 
                            : 'text-gray-600 hover:bg-gray-100 hover:text-slate-900'
                        }`}
                      >
                        <Icon size={18} className={isActive ? 'text-blue-400' : 'text-gray-400'} />
                        {item.label}
                      </button>
                    )
                  })}
                </nav>
              </aside>

              <main className="flex-1 p-4 md:p-8 overflow-y-auto h-screen">
                <header className="mb-8">
                  <h2 className="text-2xl font-bold text-slate-900 capitalize flex items-center gap-3">
                    {activeTab.replace('-', ' ')}
                  </h2>
                  <p className="text-slate-500 mt-1 text-sm">
                    {activeTab === 'dashboard' && "Overview and automated weekly reporting."}
                    {activeTab === 'tasks' && "Manage your actionable items and link them to goals."}
                    {activeTab === 'meetings' && "Log meetings to track where your time goes."}
                    {activeTab === 'insights' && "Review your workload distribution and capacity history."}
                    {activeTab === 'documents' && "Quick access to your most important files and links."}
                    {activeTab === 'tools' && "Log the utilities, scripts, or systems you build."}
                    {activeTab === 'notes' && "Quickly jot down information, links, or meeting notes."}
                    {activeTab === 'team-love' && "A record of positive feedback and shoutouts."}
                  </p>
                </header>

                {activeTab === 'dashboard' && renderDashboard()}
                {activeTab === 'tasks' && renderTasks()}
                {activeTab === 'meetings' && renderMeetings()}
                {activeTab === 'insights' && renderInsights()}
                {activeTab === 'documents' && renderDocuments()}
                {activeTab === 'tools' && renderTools()}
                {activeTab === 'notes' && renderNotes()}
                {activeTab === 'team-love' && renderTeamLove()}
                
              </main>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
