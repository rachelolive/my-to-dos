<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Tracker & Summary Dashboard</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load Babel to translate JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        /* Custom scrollbar for kanban */
        .kanban-scroll::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }
        .kanban-scroll::-webkit-scrollbar-track {
            background: #f1f5f9; 
            border-radius: 4px;
        }
        .kanban-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .kanban-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- This script tag type="text/babel" tells Babel to translate our React code -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          LayoutDashboard, CheckSquare, Wrench, FileText, Target, Plus, 
          Trash2, Copy, CheckCircle2, Circle, Briefcase, ExternalLink, 
          Clock, PieChart, CalendarDays, Flag, Battery, AlignLeft, ListTodo,
          Heart, BookOpen, Activity, History, Edit3, Users, Settings, 
          Download, Upload, KanbanSquare, List, Repeat, Award
        } from 'https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0';
        import {
          LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer
        } from 'https://esm.sh/recharts@2.12.2?deps=react@18.2.0,react-dom@18.2.0';

        // --- CONSTANTS ---
        const STRATEGIC_GOALS = [
          'New Business',
          'Retention',
          'Process Optimization',
          'Client Work',
          'People Management',
          'Admin Work'
        ];

        const GOAL_COLORS = {
          'New Business': '#3b82f6', 
          'Retention': '#10b981', 
          'Process Optimization': '#f59e0b', 
          'Client Work': '#8b5cf6', 
          'People Management': '#ec4899', 
          'Admin Work': '#64748b', 
          'Unassigned': '#9ca3af', 
          'Meetings': '#6366f1' 
        };

        const TASK_STATUSES = ['Todo', 'In Progress', 'Blocked', 'Done'];

        const getMonday = (dateString) => {
          if (!dateString) return null;
          const date = new Date(dateString);
          if (isNaN(date.getTime())) return null;
          const day = date.getDay();
          const diff = date.getDate() - day + (day === 0 ? -6 : 1);
          const monday = new Date(date.setDate(diff));
          monday.setHours(0,0,0,0);
          return monday.toISOString().split('T')[0];
        };

        const loadLocalData = (key, defaultValue) => {
          try {
            const saved = localStorage.getItem(key);
            if (saved) return JSON.parse(saved);
          } catch (e) { console.error(`Error loading ${key}`, e); }
          return defaultValue;
        };

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [taskView, setTaskView] = useState('list'); // 'list' or 'kanban'
          
          // --- APP STATE ---
          const [tasks, setTasks] = useState(() => loadLocalData('work_os_tasks', []));
          const [tools, setTools] = useState(() => loadLocalData('work_os_tools', []));
          const [notes, setNotes] = useState(() => loadLocalData('work_os_notes', []));
          const [meetings, setMeetings] = useState(() => loadLocalData('work_os_meetings', []));
          const [teamLove, setTeamLove] = useState(() => loadLocalData('work_os_team_love', []));
          const [documents, setDocuments] = useState(() => loadLocalData('work_os_documents', []));

          // --- FORM STATES ---
          const [newTask, setNewTask] = useState({ title: '', goal: '', priority: 'Medium', duration: '', assignee: 'Me', recurrence: 'None' });
          const [newTool, setNewTool] = useState({ title: '', description: '', url: '', goal: '' });
          const [newNote, setNewNote] = useState('');
          const [newMeeting, setNewMeeting] = useState({ title: '', date: new Date().toISOString().split('T')[0], duration: '', notes: '', actionItems: '' });
          const [newTeamLove, setNewTeamLove] = useState({ date: new Date().toISOString().split('T')[0], sender: '', message: '' });
          const [newDocument, setNewDocument] = useState({ title: '', url: '', description: '' });
          const [editingMeetingId, setEditingMeetingId] = useState(null);
          const [editMeetingForm, setEditMeetingForm] = useState({ notes: '', actionItems: '' });

          // --- LOCAL STORAGE SYNC ---
          useEffect(() => { localStorage.setItem('work_os_tasks', JSON.stringify(tasks)); }, [tasks]);
          useEffect(() => { localStorage.setItem('work_os_tools', JSON.stringify(tools)); }, [tools]);
          useEffect(() => { localStorage.setItem('work_os_notes', JSON.stringify(notes)); }, [notes]);
          useEffect(() => { localStorage.setItem('work_os_meetings', JSON.stringify(meetings)); }, [meetings]);
          useEffect(() => { localStorage.setItem('work_os_team_love', JSON.stringify(teamLove)); }, [teamLove]);
          useEffect(() => { localStorage.setItem('work_os_documents', JSON.stringify(documents)); }, [documents]);

          // --- DATA HANDLERS ---
          const handleAddTask = (e, forceAssignee = null) => {
            e.preventDefault();
            if (!newTask.title) return;
            const task = { 
              id: Date.now().toString(), 
              title: newTask.title, 
              status: 'Todo', 
              goal: newTask.goal, 
              priority: newTask.priority,
              duration: Number(newTask.duration) || 0,
              assignee: forceAssignee || newTask.assignee || 'Me',
              recurrence: newTask.recurrence || 'None',
              dateCreated: new Date().toISOString(),
              dateCompleted: null 
            };
            setTasks(prev => [task, ...prev]);
            setNewTask({ title: '', goal: '', priority: 'Medium', duration: '', assignee: forceAssignee || 'Me', recurrence: 'None' });
          };

          const handleTaskStatusChange = (taskId, newStatus) => {
            setTasks(prev => {
              const taskIndex = prev.findIndex(t => t.id === taskId);
              if (taskIndex === -1) return prev;
              
              const task = prev[taskIndex];
              const isCompleting = newStatus === 'Done' && task.status !== 'Done';
              
              const updatedTasks = [...prev];
              updatedTasks[taskIndex] = {
                  ...task,
                  status: newStatus,
                  dateCompleted: newStatus === 'Done' ? new Date().toISOString() : null
              };

              // Handle Auto-Recurrence
              if (isCompleting && task.recurrence && task.recurrence !== 'None') {
                  const nextTask = {
                      ...task,
                      id: Date.now().toString() + Math.random().toString(36).substring(7),
                      status: 'Todo',
                      dateCreated: new Date().toISOString(),
                      dateCompleted: null
                  };
                  updatedTasks.push(nextTask);
              }

              return updatedTasks;
            });
          };

          // For the old list view checkbox toggle
          const toggleTaskStatus = (taskToToggle) => {
             const newStatus = taskToToggle.status === 'Done' ? 'Todo' : 'Done';
             handleTaskStatusChange(taskToToggle.id, newStatus);
          };

          const deleteTask = (id) => setTasks(prev => prev.filter(t => t.id !== id));

          const handleAddTool = (e) => {
            e.preventDefault();
            if (!newTool.title) return;
            setTools(prev => [{ id: Date.now().toString(), ...newTool, dateCreated: new Date().toISOString() }, ...prev]);
            setNewTool({ title: '', description: '', url: '', goal: '' });
          };
          const deleteTool = (id) => setTools(prev => prev.filter(t => t.id !== id));

          const handleAddNote = (e) => {
            e.preventDefault();
            if (!newNote) return;
            setNotes(prev => [{ id: Date.now().toString(), content: newNote, dateCreated: new Date().toISOString() }, ...prev]);
            setNewNote('');
          };
          const deleteNote = (id) => setNotes(prev => prev.filter(n => n.id !== id));

          const handleAddMeeting = (e) => {
            e.preventDefault();
            if (!newMeeting.title || !newMeeting.duration) return;
            const meetingId = Date.now().toString();
            
            const actions = newMeeting.actionItems.split('\n').map(a => a.trim()).filter(a => a.length > 0);
            if (actions.length > 0) {
              const generatedTasks = actions.map((action, idx) => ({
                id: meetingId + '-' + idx, title: action, status: 'Todo', goal: '', priority: 'Medium', duration: 15, assignee: 'Me', recurrence: 'None', dateCreated: new Date().toISOString(), dateCompleted: null
              }));
              setTasks(prev => [...generatedTasks, ...prev]);
            }

            setMeetings(prev => [{ id: meetingId, title: newMeeting.title, date: newMeeting.date, duration: Number(newMeeting.duration), notes: newMeeting.notes, actionItems: actions, dateCreated: new Date().toISOString() }, ...prev]);
            setNewMeeting({ title: '', date: new Date().toISOString().split('T')[0], duration: '', notes: '', actionItems: '' });
          };
          const deleteMeeting = (id) => setMeetings(prev => prev.filter(m => m.id !== id));

          const startEditingMeeting = (meeting) => {
            setEditingMeetingId(meeting.id);
            setEditMeetingForm({ notes: meeting.notes || '', actionItems: '' });
          };

          const saveMeetingEdits = (id) => {
            const meeting = meetings.find(m => m.id === id);
            if (!meeting) return;
            const actions = editMeetingForm.actionItems.split('\n').map(a => a.trim()).filter(a => a.length > 0);
            if (actions.length > 0) {
              const generatedTasks = actions.map((action, idx) => ({
                id: Date.now().toString() + '-' + idx, title: action, status: 'Todo', goal: '', priority: 'Medium', duration: 15, assignee: 'Me', recurrence: 'None', dateCreated: new Date().toISOString(), dateCompleted: null
              }));
              setTasks(prev => [...generatedTasks, ...prev]);
            }
            setMeetings(prev => prev.map(m => m.id === id ? { ...m, notes: editMeetingForm.notes, actionItems: [...(m.actionItems || []), ...actions] } : m));
            setEditingMeetingId(null);
          };

          const handleAddTeamLove = (e) => {
            e.preventDefault();
            if (!newTeamLove.message) return;
            setTeamLove(prev => [{ id: Date.now().toString(), ...newTeamLove, dateCreated: new Date().toISOString() }, ...prev]);
            setNewTeamLove({ date: new Date().toISOString().split('T')[0], sender: '', message: '' });
          };
          const deleteTeamLove = (id) => setTeamLove(prev => prev.filter(i => i.id !== id));

          const handleAddDocument = (e) => {
            e.preventDefault();
            if (!newDocument.title) return;
            setDocuments(prev => [{ id: Date.now().toString(), ...newDocument, dateCreated: new Date().toISOString() }, ...prev]);
            setNewDocument({ title: '', url: '', description: '' });
          };
          const deleteDocument = (id) => setDocuments(prev => prev.filter(i => i.id !== id));

          // Settings Backup & Restore Handlers
          const exportData = () => {
            const data = { tasks, tools, notes, meetings, teamLove, documents };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `work-os-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
          };

          const importData = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
              try {
                const data = JSON.parse(event.target.result);
                if (data.tasks) setTasks(data.tasks);
                if (data.tools) setTools(data.tools);
                if (data.notes) setNotes(data.notes);
                if (data.meetings) setMeetings(data.meetings);
                if (data.teamLove) setTeamLove(data.teamLove);
                if (data.documents) setDocuments(data.documents);
                alert('Data successfully imported!');
              } catch(err) {
                alert('Invalid backup file. Could not import data.');
              }
            };
            reader.readAsText(file);
          };

          // Kanban Drag & Drop
          const handleDragStart = (e, taskId) => {
            e.dataTransfer.setData('taskId', taskId);
          };
          const handleDrop = (e, newStatus) => {
            const taskId = e.dataTransfer.getData('taskId');
            handleTaskStatusChange(taskId, newStatus);
          };
          const handleDragOver = (e) => {
            e.preventDefault();
          };

          // --- COMPUTED DATA ---
          const myTasks = useMemo(() => tasks.filter(t => !t.assignee || t.assignee === 'Me'), [tasks]);
          const nuriaTasks = useMemo(() => tasks.filter(t => t.assignee === 'Nuria'), [tasks]);

          const sortedMeetings = useMemo(() => {
            return [...meetings].sort((a, b) => new Date(b.date) - new Date(a.date));
          }, [meetings]);

          const meetingStats = useMemo(() => {
            if (meetings.length === 0) return { totalHours: 0, avgWeeklyHours: 0, percentOfWeek: 0 };
            
            const totalMinutes = meetings.reduce((acc, m) => acc + (Number(m.duration) || 0), 0);
            const totalHours = totalMinutes / 60;

            const earliestMeeting = meetings.reduce((earliest, m) => {
              const d = new Date(m.date);
              return d < earliest ? d : earliest;
            }, new Date());

            const daysActive = Math.max(1, (Date.now() - earliestMeeting.getTime()) / (1000 * 60 * 60 * 24));
            const weeksActive = Math.max(1, daysActive / 7);
            
            const avgWeeklyHours = totalHours / weeksActive;
            const percentOfWeek = (avgWeeklyHours / 40) * 100;

            return {
              totalHours: totalHours.toFixed(1),
              avgWeeklyHours: avgWeeklyHours.toFixed(1),
              percentOfWeek: percentOfWeek.toFixed(1)
            };
          }, [meetings]);

          const capacityStats = useMemo(() => {
            const now = new Date();
            const dayOfWeek = now.getDay();
            const distanceToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
            const monday = new Date(now);
            monday.setDate(now.getDate() - distanceToMonday);
            monday.setHours(0, 0, 0, 0);
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            sunday.setHours(23, 59, 59, 999);

            const thisWeekMeetings = meetings.filter(m => {
              if (!m.date) return false;
              const mDate = new Date(m.date);
              if (isNaN(mDate.getTime())) return false;
              return mDate >= monday && mDate <= sunday;
            });
            const meetingMins = thisWeekMeetings.reduce((acc, m) => acc + (Number(m.duration) || 0), 0);
            
            const tasksByGoal = {};
            STRATEGIC_GOALS.forEach(g => tasksByGoal[g] = 0);
            tasksByGoal['Unassigned'] = 0;

            let totalTaskMins = 0;
            myTasks.filter(t => {
              if (t.status !== 'Done') return true;
              if (t.status === 'Done' && t.dateCompleted) {
                const cDate = new Date(t.dateCompleted);
                if (isNaN(cDate.getTime())) return false;
                return cDate >= monday && cDate <= sunday;
              }
              return false;
            }).forEach(t => {
              const goalKey = t.goal && STRATEGIC_GOALS.includes(t.goal) ? t.goal : 'Unassigned';
              const mins = Number(t.duration) || 0;
              tasksByGoal[goalKey] += mins;
              totalTaskMins += mins;
            });

            const meetingHours = meetingMins / 60;
            const taskHours = totalTaskMins / 60;
            const remainingHours = 40 - meetingHours - taskHours;

            const tasksByGoalHours = {};
            Object.keys(tasksByGoal).forEach(k => { tasksByGoalHours[k] = (tasksByGoal[k] / 60).toFixed(1); });

            return {
              meetingHours: meetingHours.toFixed(1),
              taskHours: taskHours.toFixed(1),
              tasksByGoal: tasksByGoalHours,
              remainingHours: remainingHours.toFixed(1)
            };
          }, [meetings, myTasks]);

          const nuriaCapacityStats = useMemo(() => {
            const now = new Date();
            const dayOfWeek = now.getDay();
            const monday = new Date(now);
            monday.setDate(now.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
            monday.setHours(0, 0, 0, 0);
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            sunday.setHours(23, 59, 59, 999);

            const thisWeekTaskMins = nuriaTasks.filter(t => {
              if (t.status !== 'Done') return true;
              if (t.status === 'Done' && t.dateCompleted) {
                const cDate = new Date(t.dateCompleted);
                if (isNaN(cDate.getTime())) return false;
                return cDate >= monday && cDate <= sunday;
              }
              return false;
            }).reduce((acc, t) => acc + (Number(t.duration) || 0), 0);

            const taskHours = thisWeekTaskMins / 60;
            return {
              taskHours: taskHours.toFixed(1),
              remainingHours: (40 - taskHours).toFixed(1)
            };
          }, [nuriaTasks]);

          const historicalCapacity = useMemo(() => {
            const weeks = {};

            meetings.forEach(m => {
              const week = getMonday(m.date);
              if (!week) return;
              if (!weeks[week]) weeks[week] = { meetingMins: 0, taskMins: 0 };
              weeks[week].meetingMins += (Number(m.duration) || 0);
            });

            myTasks.forEach(t => {
              let week;
              if (t.status === 'Done' && t.dateCompleted) {
                week = getMonday(t.dateCompleted);
              } else if (t.status !== 'Done') {
                week = getMonday(new Date().toISOString()); 
              }
              
              if (!week) return;
              if (!weeks[week]) weeks[week] = { meetingMins: 0, taskMins: 0 };
              weeks[week].taskMins += (Number(t.duration) || 0);
            });

            return Object.entries(weeks).map(([weekStart, data]) => {
              const meetingHours = data.meetingMins / 60;
              const taskHours = data.taskMins / 60;
              const remainingHours = 40 - meetingHours - taskHours;
              return {
                weekStart,
                meetingHours: meetingHours.toFixed(1),
                taskHours: taskHours.toFixed(1),
                remainingHours: remainingHours.toFixed(1)
              };
            }).sort((a, b) => new Date(b.weekStart) - new Date(a.weekStart));
          }, [meetings, myTasks]);

          const weeklyGoalTrend = useMemo(() => {
            const weeks = {};
            myTasks.filter(t => t.status === 'Done' && t.dateCompleted).forEach(t => {
               const week = getMonday(t.dateCompleted);
               if (!week) return;
               
               if (!weeks[week]) {
                   weeks[week] = { weekStart: week };
                   STRATEGIC_GOALS.forEach(g => weeks[week][g] = 0);
                   weeks[week]['Unassigned'] = 0;
               }
               const goalKey = t.goal && STRATEGIC_GOALS.includes(t.goal) ? t.goal : 'Unassigned';
               weeks[week][goalKey] += (Number(t.duration) || 0) / 60;
            });
            
            return Object.values(weeks)
              .sort((a,b) => new Date(a.weekStart) - new Date(b.weekStart))
              .map(w => {
                const formattedName = new Date(w.weekStart).toLocaleDateString(undefined, {month: 'short', day:'numeric'});
                const formattedWeek = { name: formattedName };
                Object.keys(w).forEach(k => {
                  if (k !== 'weekStart') {
                    formattedWeek[k] = Number(w[k].toFixed(1));
                  }
                });
                return formattedWeek;
              });
          }, [myTasks]);

          const goalStats = useMemo(() => {
            const stats = STRATEGIC_GOALS.reduce((acc, goal) => {
                acc[goal] = { spent: 0, planned: 0, count: 0 };
                return acc;
            }, {});
            stats['Unassigned'] = { spent: 0, planned: 0, count: 0 };

            let totalAllSpentMins = 0;

            myTasks.forEach(t => {
                const goalKey = t.goal && STRATEGIC_GOALS.includes(t.goal) ? t.goal : 'Unassigned';
                if (!stats[goalKey]) stats[goalKey] = { spent: 0, planned: 0, count: 0 };
                
                stats[goalKey].count += 1;
                if (t.status === 'Done') {
                    const mins = Number(t.duration) || 0;
                    stats[goalKey].spent += mins;
                    totalAllSpentMins += mins;
                } else {
                    stats[goalKey].planned += (Number(t.duration) || 0);
                }
            });

            return Object.entries(stats).map(([goal, data]) => {
                const spentPctOfTotal = totalAllSpentMins > 0 ? ((data.spent / totalAllSpentMins) * 100).toFixed(1) : 0;
                return {
                  goal,
                  spentHours: (data.spent / 60).toFixed(1),
                  plannedHours: (data.planned / 60).toFixed(1),
                  totalHours: ((data.spent + data.planned) / 60).toFixed(1),
                  spentPctOfTotal,
                  count: data.count
                };
            }).filter(g => g.count > 0 || g.goal !== 'Unassigned')
               .sort((a, b) => Number(b.totalHours) - Number(a.totalHours));
          }, [myTasks]);

          const weeklySummary = useMemo(() => {
            const oneWeekAgo = new Date();
            oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);

            const completedTasks = myTasks.filter(t => t.status === 'Done' && new Date(t.dateCompleted) >= oneWeekAgo);
            const recentTools = tools.filter(t => new Date(t.dateCreated) >= oneWeekAgo);
            const weeklyMeetings = meetings.filter(m => new Date(m.date) >= oneWeekAgo);
            const weeklyMeetingHours = (weeklyMeetings.reduce((acc, m) => acc + Number(m.duration), 0) / 60).toFixed(1);

            let summaryText = `Weekly Summary (${new Date().toLocaleDateString()})\n\n`;
            
            summaryText += `✅ Tasks Completed (${completedTasks.length}):\n`;
            if (completedTasks.length === 0) summaryText += `  - No tasks completed this week.\n`;
            completedTasks.forEach(t => {
              const goalText = t.goal ? ` [${t.goal}]` : '';
              summaryText += `  - ${t.title}${goalText}\n`;
            });

            summaryText += `\n🛠️ Tools/Assets Created (${recentTools.length}):\n`;
            if (recentTools.length === 0) summaryText += `  - No new tools created this week.\n`;
            recentTools.forEach(t => {
              const goalText = t.goal ? ` [${t.goal}]` : '';
              summaryText += `  - ${t.title}: ${t.description}${goalText}\n`;
            });

            summaryText += `\n📅 Time in Meetings This Week: ${weeklyMeetingHours} hours\n`;

            return summaryText;
          }, [myTasks, tools, meetings]);

          const quarterlyReviewReport = useMemo(() => {
            const ninetyDaysAgo = new Date();
            ninetyDaysAgo.setDate(ninetyDaysAgo.getDate() - 90);

            const qTasks = myTasks.filter(t => t.status === 'Done' && new Date(t.dateCompleted) >= ninetyDaysAgo);
            const qTools = tools.filter(t => new Date(t.dateCreated) >= ninetyDaysAgo);
            const qLove = teamLove.filter(l => new Date(l.date) >= ninetyDaysAgo);
            
            const hoursLogged = (qTasks.reduce((acc, t) => acc + (Number(t.duration)||0), 0) / 60).toFixed(1);

            let report = `QUARTERLY PERFORMANCE REVIEW SUMMARY (Last 90 Days)\nGenerated: ${new Date().toLocaleDateString()}\n`;
            report += `====================================================\n\n`;
            report += `📊 HIGH-LEVEL METRICS\n`;
            report += `- Total Tasks Completed: ${qTasks.length}\n`;
            report += `- Total Project/Task Hours Logged: ${hoursLogged}h\n`;
            report += `- Tools & Systems Built: ${qTools.length}\n\n`;

            report += `🎯 TOP ACCOMPLISHMENTS (Tools Built)\n`;
            if(qTools.length === 0) report += `- None recorded.\n`;
            qTools.forEach(t => report += `- ${t.title}: ${t.description}\n`);
            report += `\n`;

            report += `💖 TEAM FEEDBACK & LOVE\n`;
            if(qLove.length === 0) report += `- None recorded.\n`;
            qLove.forEach(l => report += `- "${l.message}" (From: ${l.sender || 'Anonymous'})\n`);

            return report;
          }, [myTasks, tools, teamLove]);

          const copyToClipboard = (text) => {
            navigator.clipboard.writeText(text).catch(err => {
              const textArea = document.createElement("textarea");
              textArea.value = text;
              document.body.appendChild(textArea);
              textArea.select();
              try { document.execCommand('copy'); } catch (e) {}
              document.body.removeChild(textArea);
            });
          };

          // --- COMPONENTS ---
          const getPriorityStyles = (priority) => {
            switch(priority) {
              case 'High': return 'bg-red-50 text-red-600 border-red-100';

            </div>
          );

          const renderDocuments = () => (
            <div className="space-y-6 animate-in">
              <form onSubmit={handleAddDocument} className="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col gap-3">
                <div className="flex flex-col md:flex-row gap-3">
                  <input type="text" placeholder="Document Title" className="flex-1 p-2 border border-gray-200 rounded-lg focus:outline-none" value={newDocument.title} onChange={e => setNewDocument({...newDocument, title: e.target.value})} />
                  <input type="text" placeholder="Document URL" className="flex-1 p-2 border border-gray-200 rounded-lg focus:outline-none" value={newDocument.url} onChange={e => setNewDocument({...newDocument, url: e.target.value})} />
                </div>
                <input type="text" placeholder="Short description (optional)" className="w-full p-2 border border-gray-200 rounded-lg focus:outline-none text-sm" value={newDocument.description} onChange={e => setNewDocument({...newDocument, description: e.target.value})} />
                <div className="flex justify-end">
                  <button type="submit" className="px-4 py-2 bg-cyan-600 hover:bg-cyan-700 text-white rounded-lg flex items-center gap-2 font-medium">
                    <BookOpen size={18} /> Add Document
                  </button>
                </div>
              </form>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {documents.length === 0 && <div className="col-span-full p-8 text-center text-gray-500 bg-white rounded-xl border border-dashed">No documents saved yet.</div>}
                {documents.map(doc => (
                  <div key={doc.id} className="bg-white p-5 rounded-xl border border-gray-100 shadow-sm flex flex-col group relative">
                    <button onClick={() => deleteDocument(doc.id)} className="absolute top-4 right-4 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><Trash2 size={16} /></button>
                    <div className="flex items-center gap-3 mb-2">
                      <div className="p-2 bg-cyan-50 text-cyan-600 rounded-lg"><BookOpen size={18} /></div>
                      <h4 className="font-bold text-gray-800 pr-6 truncate">{doc.title}</h4>
                    </div>
                    {doc.description && <p className="text-gray-600 text-sm mb-4 flex-1">{doc.description}</p>}
                    <div className="mt-auto pt-4 border-t border-gray-50 flex items-center justify-end">
                      {doc.url && <a href={doc.url.startsWith('http') ? doc.url : `https://${doc.url}`} target="_blank" className="text-cyan-600 hover:text-cyan-800 text-sm font-medium flex items-center gap-1">Open <ExternalLink size={14} /></a>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );

          const renderTeamLove = () => (
            <div className="space-y-6 animate-in">
              <form onSubmit={handleAddTeamLove} className="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col gap-3">
                <div className="flex flex-col md:flex-row gap-3">
                  <input type="date" className="p-2 border border-gray-200 rounded-lg focus:outline-none bg-white" value={newTeamLove.date} onChange={e => setNewTeamLove({...newTeamLove, date: e.target.value})} />
                  <input type="text" placeholder="Who sent the love? (Optional)" className="flex-1 p-2 border border-gray-200 rounded-lg focus:outline-none" value={newTeamLove.sender} onChange={e => setNewTeamLove({...newTeamLove, sender: e.target.value})} />
                </div>
                <textarea placeholder="Paste the nice words here..." className="w-full p-3 border border-gray-200 rounded-lg focus:outline-none resize-none h-24 text-gray-700" value={newTeamLove.message} onChange={e => setNewTeamLove({...newTeamLove, message: e.target.value})} />
                <div className="flex justify-end">
                  <button type="submit" className="px-4 py-2 bg-rose-500 hover:bg-rose-600 text-white rounded-lg flex items-center gap-2 font-medium">
                    <Heart size={18} /> Save Team Love
                  </button>
                </div>
              </form>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {teamLove.length === 0 && <div className="col-span-full p-8 text-center text-gray-500 bg-white rounded-xl border border-dashed">No team love recorded yet.</div>}
                {teamLove.sort((a,b) => new Date(b.date) - new Date(a.date)).map(love => (
                  <div key={love.id} className="bg-rose-50 p-5 rounded-xl border border-rose-100 shadow-sm group relative">
                    <button onClick={() => deleteTeamLove(love.id)} className="absolute top-3 right-3 text-rose-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><Trash2 size={16} /></button>
                    <Heart size={20} className="text-rose-400 mb-3" fill="currentColor" />
                    <p className="text-gray-800 whitespace-pre-wrap pr-4 text-sm italic">"{love.message}"</p>
                    <div className="mt-4 pt-3 border-t border-rose-200/50 flex justify-between items-center text-xs text-rose-700/70 font-medium">
                      <span>{love.sender ? `- ${love.sender}` : 'Anonymous'}</span><span>{new Date(love.date).toLocaleDateString()}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );

          const renderSettings = () => (
            <div className="space-y-6 animate-in">
                <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2 mb-2">
                        <Download size={20} className="text-blue-500" /> Export Backup
                    </h3>
                    <p className="text-sm text-gray-500 mb-4">Download a complete backup of your Work OS data as a JSON file. Use this to transfer your data to a new computer or browser.</p>
                    <button onClick={exportData} className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg flex items-center gap-2 font-medium transition-colors text-sm">
                        <Download size={16} /> Download Backup (.json)
                    </button>
                </div>
                
                <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2 mb-2">
                        <Upload size={20} className="text-amber-500" /> Import Backup
                    </h3>
                    <p className="text-sm text-gray-500 mb-4">Upload a previously downloaded backup file. <strong>Warning:</strong> This will overwrite all of your current data.</p>
                    <input type="file" accept=".json" onChange={importData} className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-amber-50 file:text-amber-700 hover:file:bg-amber-100 cursor-pointer"/>
                </div>

                <div className="bg-red-50 p-6 rounded-xl border border-red-100 shadow-sm mt-8">
                    <h3 className="text-lg font-bold text-red-800 flex items-center gap-2 mb-2">
                        <Trash2 size={20} className="text-red-500" /> Danger Zone
                    </h3>
                    <p className="text-sm text-red-600/80 mb-4">Permanently delete all data from this browser. This cannot be undone unless you have a backup.</p>
                    <button onClick={() => {
                        if(confirm('Are you absolutely sure? This will wipe ALL tasks, tools, meetings, and notes permanently.')) {
                            localStorage.clear();
                            window.location.reload();
                        }
                    }} className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg flex items-center gap-2 font-medium transition-colors text-sm">
                        <Trash2 size={16} /> Wipe All Data
                    </button>
                </div>
            </div>
          );

          // ... (Dashboard and Insights logic omitted for brevity, placed directly in render map below)
          
          return (
            <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row font-sans">
              <aside className="w-full md:w-64 bg-white border-r border-gray-200 md:min-h-screen flex flex-col">
                <div className="p-6 border-b border-gray-100 flex items-center gap-3">
                  <div className="p-2 bg-slate-900 rounded-lg text-white"><Briefcase size={20} /></div>
                  <h1 className="font-bold text-xl text-slate-900">Work OS</h1>
                </div>
                <nav className="flex-1 p-4 space-y-1 overflow-y-auto">
                  {[
                    { id: 'dashboard', label: 'Dashboard & Summary', icon: LayoutDashboard },
                    { id: 'tasks', label: 'Tasks & To-dos', icon: CheckSquare },
                    { id: 'direct-reports', label: 'Direct Reports', icon: Users },
                    { id: 'meetings', label: 'Meetings & Time', icon: Clock },
                    { id: 'insights', label: 'Insights & Review', icon: Activity },
                    { id: 'documents', label: 'Important Docs', icon: BookOpen },
                    { id: 'tools', label: 'Tool Portfolio', icon: Wrench },
                    { id: 'notes', label: 'Information Log', icon: FileText },
                    { id: 'team-love', label: 'Team Love', icon: Heart },
                    { id: 'settings', label: 'Settings & Backup', icon: Settings },
                  ].map((item) => {
                    const Icon = item.icon;
                    const isActive = activeTab === item.id;
                    return (
                      <button
                        key={item.id}
                        onClick={() => setActiveTab(item.id)}
                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-sm ${isActive ? 'bg-slate-900 text-white shadow-md' : 'text-gray-600 hover:bg-gray-100 hover:text-slate-900'}`}
                      >
                        <Icon size={18} className={isActive ? 'text-blue-400' : 'text-gray-400'} /> {item.label}
                      </button>
                    )
                  })}
                </nav>
              </aside>

              <main className="flex-1 p-4 md:p-8 overflow-y-auto h-screen relative">
                <header className="mb-8">
                  <h2 className="text-2xl font-bold text-slate-900 capitalize flex items-center gap-3">
                    {activeTab.replace('-', ' ')}
                  </h2>
                </header>

                {activeTab === 'dashboard' && (
                    <div className="space-y-8 animate-in">
                        <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm mb-4">
                            <div className="flex justify-between items-center mb-4">
                            <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                                <Battery size={20} className="text-blue-500" /> This Week's Capacity (40h)
                            </h3>
                            <span className={`font-bold px-3 py-1 rounded-full text-sm ${capacityStats.remainingHours < 0 ? 'bg-red-50 text-red-600' : 'bg-emerald-50 text-emerald-600'}`}>
                                {capacityStats.remainingHours}h Remaining
                            </span>
                            </div>
                            
                            <div className="w-full bg-gray-100 rounded-full h-6 mb-4 flex overflow-hidden shadow-inner">
                            <div className="h-6 transition-all border-r border-white/20 last:border-0 flex items-center justify-center text-[10px] text-white font-bold" style={{ width: `${(capacityStats.meetingHours / 40) * 100}%`, backgroundColor: GOAL_COLORS['Meetings'] }} title={`Meetings: ${capacityStats.meetingHours}h`}>
                                {capacityStats.meetingHours > 1 && 'Mtg'}
                            </div>
                            {Object.entries(capacityStats.tasksByGoal).map(([goal, hours]) => {
                                if (Number(hours) === 0) return null;
                                return (
                                <div key={goal} className="h-6 transition-all border-r border-white/20 last:border-0 flex items-center justify-center text-[10px] text-white font-bold" style={{ width: `${(Number(hours) / 40) * 100}%`, backgroundColor: GOAL_COLORS[goal] || GOAL_COLORS['Unassigned'] }} title={`${goal}: ${hours}h`}></div>
                                );
                            })}
                            </div>

                            <div className="flex flex-wrap gap-4 text-sm text-gray-600 font-medium bg-gray-50 p-4 rounded-lg">
                            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full" style={{backgroundColor: GOAL_COLORS['Meetings']}}></span> Meetings: {capacityStats.meetingHours}h</span>
                            {Object.entries(capacityStats.tasksByGoal).map(([goal, hours]) => {
                                if (Number(hours) === 0) return null;
                                return (
                                <span key={goal} className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full" style={{backgroundColor: GOAL_COLORS[goal] || GOAL_COLORS['Unassigned']}}></span> {goal}: {hours}h</span>
                                );
                            })}
                            </div>
                        </div>

                        {tools.length > 0 && (
                          <div className="bg-white p-5 rounded-xl border border-gray-100 shadow-sm">
                            <h3 className="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                              <Wrench size={16} /> My Tools
                            </h3>
                            <div className="flex flex-wrap gap-3">
                              {tools.map(tool => (
                                tool.url ? (
                                  <a key={tool.id} href={tool.url.startsWith('http') ? tool.url : `https://${tool.url}`} target="_blank" rel="noopener noreferrer" className="flex items-center gap-2 px-4 py-2 bg-slate-900 text-white rounded-lg hover:bg-slate-800 transition-colors text-sm font-medium shadow-sm">
                                    {tool.title} <ExternalLink size={14} className="opacity-70" />
                                  </a>
                                ) : (
                                  <span key={tool.id} className="flex items-center gap-2 px-4 py-2 bg-gray-100 text-gray-600 rounded-lg text-sm font-medium cursor-default">{tool.title}</span>
                                )
                              ))}
                            </div>
                          </div>
                        )}

                        <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2"><FileText size={20} className="text-gray-500" /> Auto-Generated Weekly Summary</h3>
                                <button onClick={() => copyToClipboard(weeklySummary)} className="flex items-center gap-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition-colors text-sm font-medium">
                                    <Copy size={16} /> Copy
                                </button>
                            </div>
                            <textarea readOnly value={weeklySummary} className="w-full h-64 p-4 bg-gray-50 border border-gray-200 rounded-lg text-sm font-mono text-gray-700 resize-none focus:outline-none"/>
                        </div>
                    </div>
                )}

                {activeTab === 'insights' && (
                    <div className="space-y-6 animate-in">
                        <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                          <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2 mb-4"><Target size={20} className="text-indigo-500" /> Time by Strategic Goal</h3>
                          {goalStats.length === 0 ? (
                            <div className="p-4 text-center text-gray-500 text-sm bg-gray-50 rounded-lg border border-gray-100 border-dashed">Assign durations and goals to tasks to see insights here!</div>
                          ) : (
                            <div className="space-y-5">
                              {goalStats.map(stat => {
                                const total = Math.max(Number(stat.totalHours), 0.1); 
                                const spentPct = (Number(stat.spentHours) / total) * 100;
                                const plannedPct = (Number(stat.plannedHours) / total) * 100;
                                return (
                                  <div key={stat.goal}>
                                    <div className="flex justify-between text-sm font-bold text-gray-700 mb-2">
                                      <span className="flex items-center gap-2"><span className="w-3 h-3 rounded-full" style={{backgroundColor: GOAL_COLORS[stat.goal] || GOAL_COLORS['Unassigned']}}></span>{stat.goal} <span className="text-gray-400 font-normal">({stat.count} tasks)</span></span>
                                      <span>{stat.totalHours}h Total</span>
                                    </div>
                                    <div className="w-full bg-gray-100 rounded-full h-2 mb-2 flex overflow-hidden">
                                      <div className="h-2 transition-all opacity-100" style={{width: `${spentPct}%`, backgroundColor: GOAL_COLORS[stat.goal] || GOAL_COLORS['Unassigned']}}></div>
                                      <div className="h-2 transition-all opacity-40" style={{width: `${plannedPct}%`, backgroundColor: GOAL_COLORS[stat.goal] || GOAL_COLORS['Unassigned']}}></div>
                                    </div>
                                    <div className="flex justify-between items-center text-xs text-gray-500 font-medium">
                                      <div className="flex gap-4">
                                        <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full" style={{backgroundColor: GOAL_COLORS[stat.goal] || GOAL_COLORS['Unassigned']}}></span> {stat.spentHours}h Spent</span>
                                        <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full opacity-40" style={{backgroundColor: GOAL_COLORS[stat.goal] || GOAL_COLORS['Unassigned']}}></span> {stat.plannedHours}h Planned</span>
                                      </div>
                                      {Number(stat.spentHours) > 0 && <span className="text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded font-bold">{stat.spentPctOfTotal}% of total work</span>}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          )}
                        </div>

                        {weeklyGoalTrend.length > 0 && (
                          <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm mb-4">
                            <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2 mb-6"><Activity size={20} className="text-slate-500" /> Goal Trend (Completed Hours)</h3>
                            <div className="h-80 w-full">
                              <ResponsiveContainer width="100%" height="100%">
                                <LineChart data={weeklyGoalTrend} margin={{ top: 5, right: 20, bottom: 5, left: 0 }}>
                                  <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                  <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} dy={10} />
                                  <YAxis axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} dx={-10} />
                                  <Tooltip contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} itemStyle={{fontSize: '14px', fontWeight: '500'}}/>
                                  <Legend iconType="circle" wrapperStyle={{fontSize: '12px', paddingTop: '20px'}} />
                                  {STRATEGIC_GOALS.map(goal => <Line key={goal} type="monotone" dataKey={goal} stroke={GOAL_COLORS[goal]} strokeWidth={3} dot={{r: 4, strokeWidth: 2}} activeDot={{r: 6}} /> )}
                                  <Line key="Unassigned" type="monotone" dataKey="Unassigned" stroke={GOAL_COLORS['Unassigned']} strokeWidth={2} strokeDasharray="5 5" />
                                </LineChart>
                              </ResponsiveContainer>
                            </div>
                          </div>
                        )}

                         <div className="bg-gradient-to-r from-blue-900 to-indigo-900 p-6 rounded-xl shadow-md text-white">
                            <div className="flex justify-between items-center mb-4">
                                <div>
                                    <h3 className="text-lg font-bold flex items-center gap-2"><Award size={20} className="text-yellow-400"/> Quarterly Performance Review Generator</h3>
                                    <p className="text-blue-100 text-sm mt-1">Automatically generates a self-evaluation based on your last 90 days.</p>
                                </div>
                                <button onClick={() => copyToClipboard(quarterlyReviewReport)} className="px-4 py-2 bg-white text-indigo-900 hover:bg-gray-100 rounded-lg flex items-center gap-2 font-bold text-sm transition-colors shrink-0">
                                    <Copy size={16} /> Copy Report
                                </button>
                            </div>
                            <textarea readOnly value={quarterlyReviewReport} className="w-full h-48 p-4 bg-white/10 border border-white/20 rounded-lg text-sm font-mono text-white resize-none focus:outline-none"/>
                        </div>
                    </div>
                )}

                {activeTab === 'tasks' && renderTasks()}
                {activeTab === 'direct-reports' && renderDirectReports()}
                {activeTab === 'meetings' && renderMeetings()}
                {activeTab === 'documents' && renderDocuments()}
                {activeTab === 'tools' && renderTools()}
                {activeTab === 'notes' && renderNotes()}
                {activeTab === 'team-love' && renderTeamLove()}
                {activeTab === 'settings' && renderSettings()}

              </main>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
