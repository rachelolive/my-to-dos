<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Tracker & Summary Dashboard</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load Babel to translate JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        /* Custom scrollbar for kanban and other overflow areas */
        .custom-scroll::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f5f9; 
            border-radius: 4px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- This script tag type="text/babel" tells Babel to translate our React code -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          LayoutDashboard, CheckSquare, Wrench, FileText, Target, Plus, 
          Trash2, Copy, CheckCircle2, Circle, Briefcase, ExternalLink, 
          Clock, PieChart, CalendarDays, Flag, Battery, AlignLeft, ListTodo,
          Heart, BookOpen, Activity, History, Edit3, Users, Settings, 
          Download, Upload, KanbanSquare, List, Repeat, Award, Search, 
          Filter, ChevronDown, ChevronUp, AlertCircle, Calendar
        } from 'https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0';
        import {
          LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer
        } from 'https://esm.sh/recharts@2.12.2?deps=react@18.2.0,react-dom@18.2.0';

        // --- CONSTANTS ---
        const STRATEGIC_GOALS = [
          'New Business',
          'Retention',
          'Process Optimization',
          'Client Work',
          'People Management',
          'Admin Work'
        ];

        const GOAL_COLORS = {
          'New Business': '#3b82f6', 
          'Retention': '#10b981', 
          'Process Optimization': '#f59e0b', 
          'Client Work': '#8b5cf6', 
          'People Management': '#ec4899', 
          'Admin Work': '#64748b', 
          'Unassigned': '#9ca3af', 
          'Meetings': '#6366f1' 
        };

        const TASK_STATUSES = ['Todo', 'In Progress', 'Blocked', 'Done'];

        // --- HELPER FUNCTIONS ---
        const getMonday = (dateString) => {
          if (!dateString) return null;
          const date = new Date(dateString);
          if (isNaN(date.getTime())) return null;
          const day = date.getDay();
          const diff = date.getDate() - day + (day === 0 ? -6 : 1);
          const monday = new Date(date.setDate(diff));
          monday.setHours(0,0,0,0);
          return monday.toISOString().split('T')[0];
        };

        const loadLocalData = (key, defaultValue) => {
          try {
            const saved = localStorage.getItem(key);
            if (saved) return JSON.parse(saved);
          } catch (e) { 
            console.error(`Error loading ${key}`, e); 
          }
          return defaultValue;
        };

        const isOverdue = (dueDateString) => {
            if (!dueDateString) return false;
            const today = new Date();
            today.setHours(0,0,0,0);
            const dueDate = new Date(dueDateString);
            // Adjust to midnight to accurately compare days
            dueDate.setHours(0,0,0,0);
            return dueDate < today;
        };

        const getPriorityStyles = (priority) => {
            switch(priority) {
              case 'High': return 'bg-red-50 text-red-600 border-red-100';
              case 'Medium': return 'bg-amber-50 text-amber-600 border-amber-100';
              case 'Low': return 'bg-slate-50 text-slate-600 border-slate-100';
              default: return 'bg-gray-50 text-gray-600 border-gray-100';
            }
        };

        // --- SUB-COMPONENTS (Defined outside App to prevent focus loss issues) ---
        
        const TaskSubtasks = ({ task, onAddSubtask, onToggleSubtask, onDeleteSubtask }) => {
            const [newSubtask, setNewSubtask] = useState('');
            
            const handleAdd = (e) => {
                e.preventDefault();
                if (!newSubtask.trim()) return;
                onAddSubtask(task.id, newSubtask);
                setNewSubtask('');
            };

            const subtasks = task.subtasks || [];
            const completedCount = subtasks.filter(st => st.completed).length;

            return (
                <div className="mt-3 pt-3 border-t border-slate-100 animate-in">
                    <div className="flex justify-between items-center mb-2">
                        <span className="text-xs font-bold text-slate-500 uppercase">Sub-Tasks</span>
                        {subtasks.length > 0 && (
                            <span className="text-[10px] font-bold bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">
                                {completedCount} / {subtasks.length}
                            </span>
                        )}
                    </div>
                    
                    <ul className="space-y-1.5 mb-3">
                        {subtasks.map(st => (
                            <li key={st.id} className="flex items-start gap-2 group/sub">
                                <button 
                                    onClick={() => onToggleSubtask(task.id, st.id)} 
                                    className={`mt-0.5 shrink-0 ${st.completed ? 'text-emerald-500' : 'text-slate-300 hover:text-blue-500'}`}
                                >
                                    {st.completed ? <CheckCircle2 size={14} /> : <Circle size={14} />}
                                </button>
                                <span className={`text-xs flex-1 ${st.completed ? 'line-through text-slate-400' : 'text-slate-700'}`}>
                                    {st.text}
                                </span>
                                <button 
                                    onClick={() => onDeleteSubtask(task.id, st.id)}
                                    className="text-slate-300 hover:text-red-500 opacity-0 group-hover/sub:opacity-100 transition-opacity"
                                >
                                    <Trash2 size={12} />
                                </button>
                            </li>
                        ))}
                    </ul>

                    <form onSubmit={handleAdd} className="flex gap-2">
                        <input 
                            type="text" 
                            placeholder="Add sub-task..." 
                            className="flex-1 text-xs p-1.5 border border-slate-200 rounded focus:outline-none focus:border-blue-400 bg-slate-50 focus:bg-white transition-colors"
                            value={newSubtask}
                            onChange={e => setNewSubtask(e.target.value)}
                        />
                        <button type="submit" className="bg-slate-100 hover:bg-slate-200 text-slate-600 px-2 rounded transition-colors">
                            <Plus size={14} />
                        </button>
                    </form>
                </div>
            );
        };

        const TaskCard = ({ task, onDragStart, onDelete, onStatusChange, onAddSubtask, onToggleSubtask, onDeleteSubtask }) => {
            const [expanded, setExpanded] = useState(false);
            const overdue = task.status !== 'Done' && isOverdue(task.dueDate);

            return (
                <div 
                    draggable 
                    onDragStart={(e) => onDragStart(e, task.id)} 
                    className={`bg-white p-3 rounded-lg shadow-sm border cursor-move hover:shadow-md transition-shadow group ${overdue ? 'border-red-300' : 'border-gray-100'}`}
                >
                    <div className="flex justify-between items-start mb-2 gap-2">
                        <p className={`text-gray-800 font-medium text-sm leading-tight flex-1 ${task.status === 'Done' ? 'line-through text-gray-400' : ''}`}>
                            {task.title}
                        </p>
                        <div className="flex items-center gap-1">
                            <button onClick={() => setExpanded(!expanded)} className="text-slate-400 hover:text-blue-500 transition-colors p-1 bg-slate-50 hover:bg-blue-50 rounded">
                                {expanded ? <ChevronUp size={14} /> : <ChevronDown size={14} />}
                            </button>
                            <button onClick={() => onDelete(task.id)} className="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity shrink-0 p-1">
                                <Trash2 size={14} />
                            </button>
                        </div>
                    </div>
                    
                    <div className="flex flex-wrap gap-1.5 mt-2">
                        {task.dueDate && (
                            <span className={`inline-flex items-center gap-1 text-[10px] font-medium px-2 py-0.5 rounded border ${overdue ? 'bg-red-50 text-red-600 border-red-200 font-bold' : 'bg-slate-50 text-slate-600 border-slate-200'}`}>
                                {overdue ? <AlertCircle size={10} /> : <Calendar size={10} />} 
                                {new Date(task.dueDate).toLocaleDateString(undefined, {month: 'short', day: 'numeric'})}
                            </span>
                        )}
                        {task.duration > 0 && (
                        <span className="inline-flex items-center gap-1 text-[10px] font-medium px-2 py-0.5 rounded border border-gray-200 text-gray-500">
                            <Clock size={10} /> {task.duration}m
                        </span>
                        )}
                        {task.priority && (
                        <span className={`inline-flex items-center gap-1 text-[10px] font-medium px-2 py-0.5 rounded border ${getPriorityStyles(task.priority)}`}>
                            <Flag size={10} /> {task.priority}
                        </span>
                        )}
                        {task.recurrence && task.recurrence !== 'None' && (
                            <span className="inline-flex items-center gap-1 text-[10px] font-medium px-2 py-0.5 rounded border border-purple-100 bg-purple-50 text-purple-600">
                                <Repeat size={10} /> {task.recurrence}
                            </span>
                        )}
                        {task.subtasks && task.subtasks.length > 0 && !expanded && (
                            <span className="inline-flex items-center gap-1 text-[10px] font-medium px-2 py-0.5 rounded bg-blue-50 text-blue-600 border border-blue-100 cursor-pointer" onClick={() => setExpanded(true)}>
                                <ListTodo size={10} /> {task.subtasks.filter(s=>s.completed).length}/{task.subtasks.length}
                            </span>
                        )}
                    </div>
                    
                    {task.goal && (
                        <div className="mt-2 pt-2 border-t border-gray-50 flex justify-between items-center">
                            <span className="inline-flex items-center gap-1 text-[10px] font-medium px-2 py-0.5 rounded bg-gray-100 text-gray-600">
                                <Target size={10} /> {task.goal}
                            </span>
                        </div>
                    )}

                    {expanded && (
                        <TaskSubtasks 
                            task={task} 
                            onAddSubtask={onAddSubtask} 
                            onToggleSubtask={onToggleSubtask} 
                            onDeleteSubtask={onDeleteSubtask} 
                        />
                    )}
                </div>
            );
        };


        // --- MAIN APP COMPONENT ---
        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [taskView, setTaskView] = useState('list'); // 'list' or 'kanban'
          
          // --- APP STATE ---
          const [tasks, setTasks] = useState(() => loadLocalData('work_os_tasks', []));
          const [tools, setTools] = useState(() => loadLocalData('work_os_tools', []));
          const [notes, setNotes] = useState(() => loadLocalData('work_os_notes', []));
          const [meetings, setMeetings] = useState(() => loadLocalData('work_os_meetings', []));
          const [teamLove, setTeamLove] = useState(() => loadLocalData('work_os_team_love', []));
          const [documents, setDocuments] = useState(() => loadLocalData('work_os_documents', []));
          // --- Saved weekly summaries ---
          const [savedSummaries, setSavedSummaries] = useState(() => loadLocalData('work_os_saved_summaries', []));
          // --- Archived (completed) tasks from previous weeks ---
          const [archivedTasks, setArchivedTasks] = useState(() => loadLocalData('work_os_archived_tasks', []));
          // --- AI summary state ---
          const [aiSummary, setAiSummary] = useState('');
          const [aiSummaryLoading, setAiSummaryLoading] = useState(false);

          // --- GLOBAL SEARCH & FILTER STATE ---
          const [searchQuery, setSearchQuery] = useState('');
          const [taskFilter, setTaskFilter] = useState({ goal: 'All', priority: 'All' });
          const [archiveFilter, setArchiveFilter] = useState({ goal: 'All', assignee: 'All', search: '' });

          // --- FORM STATES ---
          const [newTask, setNewTask] = useState({ title: '', goal: '', priority: 'Medium', duration: '', assignee: 'Me', recurrence: 'None', dueDate: '' });
          const [newTool, setNewTool] = useState({ title: '', description: '', url: '', goal: '' });
          const [newNote, setNewNote] = useState('');
          const [newMeeting, setNewMeeting] = useState({ title: '', date: new Date().toISOString().split('T')[0], duration: '', notes: '', actionItems: '' });
          const [newTeamLove, setNewTeamLove] = useState({ date: new Date().toISOString().split('T')[0], sender: '', message: '' });
          const [newDocument, setNewDocument] = useState({ title: '', url: '', description: '' });
          const [editingMeetingId, setEditingMeetingId] = useState(null);
          const [editMeetingForm, setEditMeetingForm] = useState({ notes: '', actionItems: '' });

          // --- LOCAL STORAGE SYNC ---
          useEffect(() => { localStorage.setItem('work_os_tasks', JSON.stringify(tasks)); }, [tasks]);
          useEffect(() => { localStorage.setItem('work_os_tools', JSON.stringify(tools)); }, [tools]);
          useEffect(() => { localStorage.setItem('work_os_notes', JSON.stringify(notes)); }, [notes]);
          useEffect(() => { localStorage.setItem('work_os_meetings', JSON.stringify(meetings)); }, [meetings]);
          useEffect(() => { localStorage.setItem('work_os_team_love', JSON.stringify(teamLove)); }, [teamLove]);
          useEffect(() => { localStorage.setItem('work_os_documents', JSON.stringify(documents)); }, [documents]);
          useEffect(() => { localStorage.setItem('work_os_saved_summaries', JSON.stringify(savedSummaries)); }, [savedSummaries]);
          useEffect(() => { localStorage.setItem('work_os_archived_tasks', JSON.stringify(archivedTasks)); }, [archivedTasks]);

          // --- Reset 'Done' tasks every Monday, archiving them first ---
          // Only runs when a previous week is recorded AND it differs from the current week.
          // On first ever load (no stored key) we just record the current Monday without touching tasks.
          useEffect(() => {
            const currentMonday = getMonday(new Date().toISOString());
            const lastReset = localStorage.getItem('work_os_last_reset');
            if (lastReset && lastReset !== currentMonday) {
              setTasks(prev => {
                const doneTasks = prev.filter(t => t.status === 'Done');
                if (doneTasks.length > 0) {
                  // Stamp each archived task with the week it belonged to
                  const stamped = doneTasks.map(t => ({ ...t, weekArchived: lastReset }));
                  setArchivedTasks(archive => [...stamped, ...archive]);
                }
                return prev.filter(t => t.status !== 'Done');
              });
            }
            localStorage.setItem('work_os_last_reset', currentMonday);
          }, []); // Runs once on mount

          // --- DATA HANDLERS ---
          const handleAddTask = (e, forceAssignee = null) => {
            e.preventDefault();
            if (!newTask.title) return;
            const task = { 
              id: Date.now().toString(), 
              title: newTask.title, 
              status: 'Todo', 
              goal: newTask.goal, 
              priority: newTask.priority,
              duration: Number(newTask.duration) || 0,
              dueDate: newTask.dueDate || null,
              assignee: forceAssignee || newTask.assignee || 'Me',
              recurrence: newTask.recurrence || 'None',
              subtasks: [],
              dateCreated: new Date().toISOString(),
              dateCompleted: null 
            };
            setTasks(prev => [task, ...prev]);
            setNewTask({ title: '', goal: '', priority: 'Medium', duration: '', dueDate: '', assignee: forceAssignee || 'Me', recurrence: 'None' });
          };

          const handleTaskStatusChange = (taskId, newStatus) => {
            setTasks(prev => {
              const taskIndex = prev.findIndex(t => t.id === taskId);
              if (taskIndex === -1) return prev;
              
              const task = prev[taskIndex];
              const isCompleting = newStatus === 'Done' && task.status !== 'Done';
              
              const updatedTasks = [...prev];
              updatedTasks[taskIndex] = {
                  ...task,
                  status: newStatus,
                  dateCompleted: newStatus === 'Done' ? new Date().toISOString() : null
              };

              // Handle Auto-Recurrence
              if (isCompleting && task.recurrence && task.recurrence !== 'None') {
                  // Calculate new due date if one existed
                  let newDueDate = null;
                  if (task.dueDate) {
                      const d = new Date(task.dueDate);
                      if (task.recurrence === 'Weekly') d.setDate(d.getDate() + 7);
                      if (task.recurrence === 'Monthly') d.setMonth(d.getMonth() + 1);
                      newDueDate = d.toISOString().split('T')[0];
                  }

                  // Clone task and uncheck subtasks
                  const clonedSubtasks = (task.subtasks || []).map(st => ({...st, completed: false}));

                  const nextTask = {
                      ...task,
                      id: Date.now().toString() + Math.random().toString(36).substring(7),
                      status: 'Todo',
                      dueDate: newDueDate,
                      subtasks: clonedSubtasks,
                      dateCreated: new Date().toISOString(),
                      dateCompleted: null
                  };
                  updatedTasks.push(nextTask);
              }

              return updatedTasks;
            });
          };

          const deleteTask = (id) => setTasks(prev => prev.filter(t => t.id !== id));

          // Subtask Handlers
          const handleAddSubtask = (taskId, text) => {
              setTasks(prev => prev.map(t => {
                  if (t.id === taskId) {
                      const newSub = { id: Date.now().toString(), text, completed: false };
                      return { ...t, subtasks: [...(t.subtasks || []), newSub] };
                  }
                  return t;
              }));
          };

          const toggleSubtask = (taskId, subtaskId) => {
              setTasks(prev => prev.map(t => {
                  if (t.id === taskId) {
                      const updatedSubs = (t.subtasks || []).map(st => 
                          st.id === subtaskId ? { ...st, completed: !st.completed } : st
                      );
                      return { ...t, subtasks: updatedSubs };
                  }
                  return t;
              }));
          };

          const deleteSubtask = (taskId, subtaskId) => {
              setTasks(prev => prev.map(t => {
                  if (t.id === taskId) {
                      return { ...t, subtasks: (t.subtasks || []).filter(st => st.id !== subtaskId) };
                  }
                  return t;
              }));
          };

          const handleAddTool = (e) => {
            e.preventDefault();
            if (!newTool.title) return;
            setTools(prev => [{ id: Date.now().toString(), ...newTool, dateCreated: new Date().toISOString() }, ...prev]);
            setNewTool({ title: '', description: '', url: '', goal: '' });
          };
          const deleteTool = (id) => setTools(prev => prev.filter(t => t.id !== id));

          const handleAddNote = (e) => {
            e.preventDefault();
            if (!newNote) return;
            setNotes(prev => [{ id: Date.now().toString(), content: newNote, dateCreated: new Date().toISOString() }, ...prev]);
            setNewNote('');
          };
          const deleteNote = (id) => setNotes(prev => prev.filter(n => n.id !== id));

          const handleAddMeeting = (e) => {
            e.preventDefault();
            if (!newMeeting.title || !newMeeting.duration) return;
            const meetingId = Date.now().toString();
            
            const actions = newMeeting.actionItems.split('\n').map(a => a.trim()).filter(a => a.length > 0);
            if (actions.length > 0) {
              const generatedTasks = actions.map((action, idx) => ({
                id: meetingId + '-' + idx, 
                title: action, 
                status: 'Todo', 
                goal: '', 
                priority: 'Medium', 
                duration: 15, 
                assignee: 'Me', 
                recurrence: 'None', 
                dueDate: newMeeting.date, // Auto-assign meeting date as due date for action items
                subtasks: [],
                dateCreated: new Date().toISOString(), 
                dateCompleted: null
              }));
              setTasks(prev => [...generatedTasks, ...prev]);
            }

            setMeetings(prev => [{ 
              id: meetingId, 
              title: newMeeting.title, 
              date: newMeeting.date, 
              duration: Number(newMeeting.duration), 
              notes: newMeeting.notes, 
              actionItems: actions, 
              dateCreated: new Date().toISOString() 
            }, ...prev]);
            setNewMeeting({ title: '', date: new Date().toISOString().split('T')[0], duration: '', notes: '', actionItems: '' });
          };
          const deleteMeeting = (id) => setMeetings(prev => prev.filter(m => m.id !== id));

          const startEditingMeeting = (meeting) => {
            setEditingMeetingId(meeting.id);
            setEditMeetingForm({ notes: meeting.notes || '', actionItems: '' });
          };

          const saveMeetingEdits = (id) => {
            const meeting = meetings.find(m => m.id === id);
            if (!meeting) return;
            const actions = editMeetingForm.actionItems.split('\n').map(a => a.trim()).filter(a => a.length > 0);
            
            if (actions.length > 0) {
              const generatedTasks = actions.map((action, idx) => ({
                id: Date.now().toString() + '-' + idx, 
                title: action, 
                status: 'Todo', 
                goal: '', 
                priority: 'Medium', 
                duration: 15, 
                assignee: 'Me', 
                recurrence: 'None', 
                dueDate: meeting.date,
                subtasks: [],
                dateCreated: new Date().toISOString(), 
                dateCompleted: null
              }));
              setTasks(prev => [...generatedTasks, ...prev]);
            }
            setMeetings(prev => prev.map(m => m.id === id ? { 
              ...m, 
              notes: editMeetingForm.notes, 
              actionItems: [...(m.actionItems || []), ...actions] 
            } : m));
            setEditingMeetingId(null);
          };

          const handleAddTeamLove = (e) => {
            e.preventDefault();
            if (!newTeamLove.message) return;
            setTeamLove(prev => [{ id: Date.now().toString(), ...newTeamLove, dateCreated: new Date().toISOString() }, ...prev]);
            setNewTeamLove({ date: new Date().toISOString().split('T')[0], sender: '', message: '' });
          };
          const deleteTeamLove = (id) => setTeamLove(prev => prev.filter(i => i.id !== id));

          const handleAddDocument = (e) => {
            e.preventDefault();
            if (!newDocument.title) return;
            setDocuments(prev => [{ id: Date.now().toString(), ...newDocument, dateCreated: new Date().toISOString() }, ...prev]);
            setNewDocument({ title: '', url: '', description: '' });
          };
          const deleteDocument = (id) => setDocuments(prev => prev.filter(i => i.id !== id));

          // Settings Backup & Restore Handlers
          const exportData = () => {
            const data = { tasks, tools, notes, meetings, teamLove, documents, savedSummaries, archivedTasks };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `work-os-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
          };

          const importData = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
              try {
                const data = JSON.parse(event.target.result);
                if (data.tasks) setTasks(data.tasks);
                if (data.tools) setTools(data.tools);
                if (data.notes) setNotes(data.notes);
                if (data.meetings) setMeetings(data.meetings);
                if (data.teamLove) setTeamLove(data.teamLove);
                if (data.documents) setDocuments(data.documents);
                if (data.savedSummaries) setSavedSummaries(data.savedSummaries);
                if (data.archivedTasks) setArchivedTasks(data.archivedTasks);
                alert('Data successfully imported!');
              } catch(err) {
                alert('Invalid backup file. Could not import data.');
              }
            };
            reader.readAsText(file);
          };

          // --- NEW: Save current weekly summary ---
          const handleSaveSummary = () => {
            const currentMonday = getMonday(new Date().toISOString());
            const alreadySaved = savedSummaries.some(s => s.weekOf === currentMonday);
            if (alreadySaved) {
              if (!confirm('A summary for this week already exists. Overwrite it?')) return;
              setSavedSummaries(prev => prev.filter(s => s.weekOf !== currentMonday));
            }
            const summaryRecord = {
              id: Date.now().toString(),
              content: weeklySummary,
              dateSaved: new Date().toISOString(),
              weekOf: currentMonday
            };
            setSavedSummaries(prev => [summaryRecord, ...prev]);
          };

          const deleteSavedSummary = (id) => setSavedSummaries(prev => prev.filter(s => s.id !== id));

          // --- AI-powered summary generator ---
          const generateAiSummary = async () => {
            setAiSummaryLoading(true);
            setAiSummary('');
            try {
              const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  model: 'claude-sonnet-4-5-20251022',
                  max_tokens: 1000,
                  messages: [{
                    role: 'user',
                    content: `You are a professional work assistant. Based on the raw weekly data below, write a polished, concise narrative status update (3-5 short paragraphs) that a manager could paste directly into an email or Slack. Use a confident, professional tone. Highlight accomplishments, key themes across the work, and anything notable. Do not use bullet points — write in flowing prose. Do not include a subject line.

RAW DATA:
${weeklySummary}`
                  }]
                })
              });
              const data = await response.json();
              const text = data.content && data.content[0] && data.content[0].text;
              if (text) {
                setAiSummary(text);
              } else {
                setAiSummary('Could not generate summary. Please try again.');
              }
            } catch (err) {
              setAiSummary('Error connecting to AI. Please try again.');
            }
            setAiSummaryLoading(false);
          };

          // --- FILTERING & COMPUTED DATA ---
          
          // Global Search Filters
          const globalSearchLower = searchQuery.toLowerCase();
          
          const filteredTasks = useMemo(() => {
              return tasks.filter(t => {
                  const matchesSearch = t.title.toLowerCase().includes(globalSearchLower) || 
                                        (t.subtasks && t.subtasks.some(st => st.text.toLowerCase().includes(globalSearchLower)));
                  const matchesGoal = taskFilter.goal === 'All' || t.goal === taskFilter.goal || (!t.goal && taskFilter.goal === 'Unassigned');
                  const matchesPriority = taskFilter.priority === 'All' || t.priority === taskFilter.priority;
                  return matchesSearch && matchesGoal && matchesPriority;
              });
          }, [tasks, searchQuery, taskFilter]);

          const filteredTools = useMemo(() => tools.filter(t => t.title.toLowerCase().includes(globalSearchLower) || t.description.toLowerCase().includes(globalSearchLower)), [tools, searchQuery]);
          const filteredNotes = useMemo(() => notes.filter(n => n.content.toLowerCase().includes(globalSearchLower)), [notes, searchQuery]);
          const filteredMeetings = useMemo(() => meetings.filter(m => m.title.toLowerCase().includes(globalSearchLower) || (m.notes && m.notes.toLowerCase().includes(globalSearchLower))).sort((a, b) => new Date(b.date) - new Date(a.date)), [meetings, searchQuery]);
          const filteredDocuments = useMemo(() => documents.filter(d => d.title.toLowerCase().includes(globalSearchLower) || (d.description && d.description.toLowerCase().includes(globalSearchLower))), [documents, searchQuery]);
          const filteredTeamLove = useMemo(() => teamLove.filter(l => l.message.toLowerCase().includes(globalSearchLower) || (l.sender && l.sender.toLowerCase().includes(globalSearchLower))).sort((a,b) => new Date(b.date) - new Date(a.date)), [teamLove, searchQuery]);

          const myTasks = useMemo(() => filteredTasks.filter(t => !t.assignee || t.assignee === 'Me'), [filteredTasks]);
          const nuriaTasks = useMemo(() => filteredTasks.filter(t => t.assignee === 'Nuria'), [filteredTasks]);

          const meetingStats = useMemo(() => {
            if (meetings.length === 0) return { thisWeekHours: '0.0', avgWeeklyHours: '0.0' };

            // This week bounds (Mon–Sun)
            const now = new Date();
            const dow = now.getDay();
            const mon = new Date(now);
            mon.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
            mon.setHours(0, 0, 0, 0);
            const sun = new Date(mon);
            sun.setDate(mon.getDate() + 6);
            sun.setHours(23, 59, 59, 999);

            const thisWeekMins = meetings
              .filter(m => { const d = new Date(m.date); return !isNaN(d) && d >= mon && d <= sun; })
              .reduce((acc, m) => acc + (Number(m.duration) || 0), 0);

            // Average: group all meetings by week, then average the weekly totals
            const weekBuckets = {};
            meetings.forEach(m => {
              const week = getMonday(m.date);
              if (!week) return;
              weekBuckets[week] = (weekBuckets[week] || 0) + (Number(m.duration) || 0);
            });
            const weekValues = Object.values(weekBuckets);
            const avgMins = weekValues.length > 0
              ? weekValues.reduce((a, b) => a + b, 0) / weekValues.length
              : 0;

            return {
              thisWeekHours: (thisWeekMins / 60).toFixed(1),
              avgWeeklyHours: (avgMins / 60).toFixed(1),
            };
          }, [meetings]);

          const capacityStats = useMemo(() => {
            const now = new Date();
            const dayOfWeek = now.getDay();
            const distanceToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
            const monday = new Date(now);
            monday.setDate(now.getDate() - distanceToMonday);
            monday.setHours(0, 0, 0, 0);
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            sunday.setHours(23, 59, 59, 999);

            const thisWeekMeetings = meetings.filter(m => {
              if (!m.date) return false;
              const mDate = new Date(m.date);
              if (isNaN(mDate.getTime())) return false;
              return mDate >= monday && mDate <= sunday;
            });
            const meetingMins = thisWeekMeetings.reduce((acc, m) => acc + (Number(m.duration) || 0), 0);
            
            const tasksByGoal = {};
            STRATEGIC_GOALS.forEach(g => tasksByGoal[g] = 0);
            tasksByGoal['Unassigned'] = 0;

            let totalTaskMins = 0;
            // Note: capacity calculates from raw tasks, ignoring the search query filter so percentages stay accurate
            const rawMyTasks = tasks.filter(t => !t.assignee || t.assignee === 'Me');
            rawMyTasks.filter(t => {
              if (t.status !== 'Done') return true;
              if (t.status === 'Done' && t.dateCompleted) {
                const cDate = new Date(t.dateCompleted);
                if (isNaN(cDate.getTime())) return false;
                return cDate >= monday && cDate <= sunday;
              }
              return false;
            }).forEach(t => {
              const goalKey = t.goal && STRATEGIC_GOALS.includes(t.goal) ? t.goal : 'Unassigned';
              const mins = Number(t.duration) || 0;
              tasksByGoal[goalKey] += mins;
              totalTaskMins += mins;
            });

            const meetingHours = meetingMins / 60;
            const taskHours = totalTaskMins / 60;
            const remainingHours = 40 - meetingHours - taskHours;

            const tasksByGoalHours = {};
            Object.keys(tasksByGoal).forEach(k => { tasksByGoalHours[k] = (tasksByGoal[k] / 60).toFixed(1); });

            return {
              meetingHours: meetingHours.toFixed(1),
              taskHours: taskHours.toFixed(1),
              tasksByGoal: tasksByGoalHours,
              remainingHours: remainingHours.toFixed(1)
            };
          }, [meetings, tasks]);

          const nuriaCapacityStats = useMemo(() => {
            const now = new Date();
            const dayOfWeek = now.getDay();
            const monday = new Date(now);
            monday.setDate(now.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
            monday.setHours(0, 0, 0, 0);
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            sunday.setHours(23, 59, 59, 999);

            const rawNuriaTasks = tasks.filter(t => t.assignee === 'Nuria');
            const thisWeekTaskMins = rawNuriaTasks.filter(t => {
              if (t.status !== 'Done') return true;
              if (t.status === 'Done' && t.dateCompleted) {
                const cDate = new Date(t.dateCompleted);
                if (isNaN(cDate.getTime())) return false;
                return cDate >= monday && cDate <= sunday;
              }
              return false;
            }).reduce((acc, t) => acc + (Number(t.duration) || 0), 0);

            const taskHours = thisWeekTaskMins / 60;
            return {
              taskHours: taskHours.toFixed(1),
              remainingHours: (40 - taskHours).toFixed(1)
            };
          }, [tasks]);

          const historicalCapacity = useMemo(() => {
            const weeks = {};
            const rawMyTasks = tasks.filter(t => !t.assignee || t.assignee === 'Me');

            meetings.forEach(m => {
              const week = getMonday(m.date);
              if (!week) return;
              if (!weeks[week]) weeks[week] = { meetingMins: 0, taskMins: 0 };
              weeks[week].meetingMins += (Number(m.duration) || 0);
            });

            rawMyTasks.forEach(t => {
              let week;
              if (t.status === 'Done' && t.dateCompleted) {
                week = getMonday(t.dateCompleted);
              } else if (t.status !== 'Done') {
                week = getMonday(new Date().toISOString()); 
              }
              
              if (!week) return;
              if (!weeks[week]) weeks[week] = { meetingMins: 0, taskMins: 0 };
              weeks[week].taskMins += (Number(t.duration) || 0);
            });

            return Object.entries(weeks).map(([weekStart, data]) => {
              const meetingHours = data.meetingMins / 60;
              const taskHours = data.taskMins / 60;
              const remainingHours = 40 - meetingHours - taskHours;
              return {
                weekStart,
                meetingHours: meetingHours.toFixed(1),
                taskHours: taskHours.toFixed(1),
                remainingHours: remainingHours.toFixed(1)
              };
            }).sort((a, b) => new Date(b.weekStart) - new Date(a.weekStart));
          }, [meetings, tasks]);

          const weeklyGoalTrend = useMemo(() => {
            const weeks = {};
            const rawMyTasks = tasks.filter(t => !t.assignee || t.assignee === 'Me');
            rawMyTasks.filter(t => t.status === 'Done' && t.dateCompleted).forEach(t => {
               const week = getMonday(t.dateCompleted);
               if (!week) return;
               
               if (!weeks[week]) {
                   weeks[week] = { weekStart: week };
                   STRATEGIC_GOALS.forEach(g => weeks[week][g] = 0);
                   weeks[week]['Unassigned'] = 0;
               }
               const goalKey = t.goal && STRATEGIC_GOALS.includes(t.goal) ? t.goal : 'Unassigned';
               weeks[week][goalKey] += (Number(t.duration) || 0) / 60;
            });
            
            return Object.values(weeks)
              .sort((a,b) => new Date(a.weekStart) - new Date(b.weekStart))
              .map(w => {
                const formattedName = new Date(w.weekStart).toLocaleDateString(undefined, {month: 'short', day:'numeric'});
                const formattedWeek = { name: formattedName };
                Object.keys(w).forEach(k => {
                  if (k !== 'weekStart') {
                    formattedWeek[k] = Number(w[k].toFixed(1));
                  }
                });
                return formattedWeek;
              });
          }, [tasks]);

          const goalStats = useMemo(() => {
            const stats = STRATEGIC_GOALS.reduce((acc, goal) => {
                acc[goal] = { spent: 0, planned: 0, count: 0 };
                return acc;
            }, {});
            stats['Unassigned'] = { spent: 0, planned: 0, count: 0 };

            let totalAllSpentMins = 0;
            const rawMyTasks = tasks.filter(t => !t.assignee || t.assignee === 'Me');

            rawMyTasks.forEach(t => {
                const goalKey = t.goal && STRATEGIC_GOALS.includes(t.goal) ? t.goal : 'Unassigned';
                if (!stats[goalKey]) stats[goalKey] = { spent: 0, planned: 0, count: 0 };
                
                stats[goalKey].count += 1;
                if (t.status === 'Done') {
                    const mins = Number(t.duration) || 0;
                    stats[goalKey].spent += mins;
                    totalAllSpentMins += mins;
                } else {
                    stats[goalKey].planned += (Number(t.duration) || 0);
                }
            });

            return Object.entries(stats).map(([goal, data]) => {
                const spentPctOfTotal = totalAllSpentMins > 0 ? ((data.spent / totalAllSpentMins) * 100).toFixed(1) : 0;
                return {
                  goal,
                  spentHours: (data.spent / 60).toFixed(1),
                  plannedHours: (data.planned / 60).toFixed(1),
                  totalHours: ((data.spent + data.planned) / 60).toFixed(1),
                  spentPctOfTotal,
                  count: data.count
                };
            }).filter(g => g.count > 0 || g.goal !== 'Unassigned')
               .sort((a, b) => Number(b.totalHours) - Number(a.totalHours));
          }, [tasks]);

          const weeklySummary = useMemo(() => {
            const oneWeekAgo = new Date();
            oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);

            const rawMyTasks = tasks.filter(t => !t.assignee || t.assignee === 'Me');
            const completedTasks = rawMyTasks.filter(t => t.status === 'Done' && new Date(t.dateCompleted) >= oneWeekAgo);
            const recentTools = tools.filter(t => new Date(t.dateCreated) >= oneWeekAgo);
            const weeklyMeetings = meetings.filter(m => new Date(m.date) >= oneWeekAgo);
            const weeklyMeetingHours = (weeklyMeetings.reduce((acc, m) => acc + Number(m.duration), 0) / 60).toFixed(1);

            let summaryText = `Weekly Summary (${new Date().toLocaleDateString()})\n\n`;
            
            summaryText += `✅ Tasks Completed (${completedTasks.length}):\n`;
            if (completedTasks.length === 0) summaryText += `  - No tasks completed this week.\n`;
            completedTasks.forEach(t => {
              const goalText = t.goal ? ` [${t.goal}]` : '';
              summaryText += `  - ${t.title}${goalText}\n`;
            });

            summaryText += `\n🛠️ Tools/Assets Created (${recentTools.length}):\n`;
            if (recentTools.length === 0) summaryText += `  - No new tools created this week.\n`;
            recentTools.forEach(t => {
              const goalText = t.goal ? ` [${t.goal}]` : '';
              summaryText += `  - ${t.title}: ${t.description}${goalText}\n`;
            });

            summaryText += `\n📅 Time in Meetings This Week: ${weeklyMeetingHours} hours\n`;

            return summaryText;
          }, [tasks, tools, meetings]);

          const quarterlyReviewReport = useMemo(() => {
            const ninetyDaysAgo = new Date();
            ninetyDaysAgo.setDate(ninetyDaysAgo.getDate() - 90);
            
            const rawMyTasks = tasks.filter(t => !t.assignee || t.assignee === 'Me');
            // Include archived tasks so history survives the Monday reset
            const rawMyArchived = archivedTasks.filter(t => !t.assignee || t.assignee === 'Me');
            const allCompleted = [
              ...rawMyTasks.filter(t => t.status === 'Done' && new Date(t.dateCompleted) >= ninetyDaysAgo),
              ...rawMyArchived.filter(t => t.dateCompleted && new Date(t.dateCompleted) >= ninetyDaysAgo)
            ];
            const qTasks = allCompleted;
            const qTools = tools.filter(t => new Date(t.dateCreated) >= ninetyDaysAgo);
            const qLove = teamLove.filter(l => new Date(l.date) >= ninetyDaysAgo);
            
            const hoursLogged = (qTasks.reduce((acc, t) => acc + (Number(t.duration)||0), 0) / 60).toFixed(1);

            let report = `QUARTERLY PERFORMANCE REVIEW SUMMARY (Last 90 Days)\nGenerated: ${new Date().toLocaleDateString()}\n`;
            report += `====================================================\n\n`;
            report += `📊 HIGH-LEVEL METRICS\n`;
            report += `- Total Tasks Completed: ${qTasks.length}\n`;
            report += `- Total Project/Task Hours Logged: ${hoursLogged}h\n`;
            report += `- Tools & Systems Built: ${qTools.length}\n\n`;

            report += `🎯 TOP ACCOMPLISHMENTS (Tools Built)\n`;
            if(qTools.length === 0) report += `- None recorded.\n`;
            qTools.forEach(t => report += `- ${t.title}: ${t.description}\n`);
            report += `\n`;

            report += `💖 TEAM FEEDBACK & LOVE\n`;
            if(qLove.length === 0) report += `- None recorded.\n`;
            qLove.forEach(l => report += `- "${l.message}" (From: ${l.sender || 'Anonymous'})\n`);

            return report;
          }, [tasks, archivedTasks, tools, teamLove]);

          const copyToClipboard = (text) => {
            navigator.clipboard.writeText(text).catch(err => {
              const textArea = document.createElement("textarea");
              textArea.value = text;
              document.body.appendChild(textArea);
              textArea.select();
              try { document.execCommand('copy'); } catch (e) {}
              document.body.removeChild(textArea);
            });
          };

          // --- VIEW RENDERERS ---

          // Re-usable Kanban logic
          const renderKanban = (taskList) => (
            <div className="flex gap-4 overflow-x-auto pb-4 h-[600px] custom-scroll animate-in">
                {TASK_STATUSES.map(status => (
                    <div 
                        key={status} 
                        className="flex-1 min-w-[300px] bg-slate-100/50 p-4 rounded-xl border border-slate-200 flex flex-col"
                        onDragOver={(e) => e.preventDefault()}
                        onDrop={(e) => {
                            const taskId = e.dataTransfer.getData('taskId');
                            handleTaskStatusChange(taskId, status);
                        }}
                    >
                        <div className="flex justify-between items-center mb-3">
                            <h4 className="font-bold text-slate-700 text-sm uppercase tracking-wide">{status}</h4>
                            <span className="bg-white text-slate-500 border border-slate-200 px-2 py-0.5 rounded-full text-xs font-bold shadow-sm">
                                {taskList.filter(t => t.status === status).length}
                            </span>
                        </div>
                        <div className="space-y-3 flex-1 overflow-y-auto pr-1 custom-scroll">
                            {taskList.filter(t => t.status === status).map(task => (
                                <TaskCard 
                                    key={task.id} 
                                    task={task} 
                                    onDragStart={(e, id) => e.dataTransfer.setData('taskId', id)}
                                    onDelete={deleteTask}
                                    onStatusChange={handleTaskStatusChange}
                                    onAddSubtask={handleAddSubtask}
                                    onToggleSubtask={toggleSubtask}
                                    onDeleteSubtask={deleteSubtask}
                                />
                            ))}
                        </div>
                    </div>
                ))}
            </div>
          );

          const renderList = (taskList) => (
            <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden animate-in">
                <ul className="divide-y divide-gray-100">
                  {taskList.length === 0 && (
                    <li className="p-8 text-center text-gray-400 border border-dashed border-gray-200 m-4 rounded-lg">No tasks found. Try adjusting your filters.</li>
                  )}
                  {taskList.map(task => {
                    const overdue = task.status !== 'Done' && isOverdue(task.dueDate);
                    const subtaskCount = task.subtasks ? task.subtasks.length : 0;
                    const subtaskCompleted = task.subtasks ? task.subtasks.filter(s=>s.completed).length : 0;

                    return (
                    <li key={task.id} className={`p-4 flex flex-col sm:flex-row sm:items-start justify-between hover:bg-gray-50 transition-colors group ${task.status === 'Done' ? 'opacity-75' : ''}`}>
                      <div className="flex items-start gap-3 overflow-hidden mb-2 sm:mb-0 flex-1">
                        <select 
                            value={task.status} 
                            onChange={(e) => handleTaskStatusChange(task.id, e.target.value)}
                            className={`mt-1 text-xs font-bold rounded-md px-2 py-1 border outline-none cursor-pointer shrink-0 ${task.status === 'Done' ? 'bg-emerald-50 text-emerald-600 border-emerald-200' : 'bg-white text-slate-600 border-slate-200'}`}
                        >
                            {TASK_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                        <div className="truncate flex-1">
                          <p className={`text-gray-800 font-medium whitespace-normal ${task.status === 'Done' ? 'line-through text-gray-500' : ''}`}>{task.title}</p>
                          <div className="flex items-center gap-2 mt-1 flex-wrap">
                            {task.dueDate && (
                                <span className={`inline-flex items-center gap-1 text-[10px] font-medium px-2 py-0.5 rounded border ${overdue ? 'bg-red-50 text-red-600 border-red-200 font-bold' : 'bg-slate-50 text-slate-600 border-slate-200'}`}>
                                    {overdue ? <AlertCircle size={10} /> : <Calendar size={10} />} 
                                    {new Date(task.dueDate).toLocaleDateString(undefined, {month: 'short', day: 'numeric'})}
                                </span>
                            )}
                            {task.duration > 0 && (
                              <span className="inline-flex items-center gap-1 text-[10px] font-medium px-2 py-0.5 rounded-full bg-gray-100 text-gray-600 border border-gray-200">
                                <Clock size={10} /> {task.duration}m
                              </span>

                            {task.priority && (

                                <Flag size={10} /> {task.priority}
                              </span>
                            )}
                            {task.recurrence && task.recurrence !== 'None' && (
                                <span className="inline-flex items-center gap-1 text-[10px] font-medium px-2 py-0.5 rounded-full border border-purple-100 bg-purple-50 text-purple-600">
                                    <Repeat size={10} /> {task.recurrence}

                            {task.goal && (

                                <Target size={10} /> {task.goal}
                              </span>

                            {subtaskCount > 0 && (

                          {/* Expanded List Subtasks */}

                             <TaskSubtasks

                                onDeleteSubtask={deleteSubtask}

                          </div>

                        </div>
                      </div>
                      <button onClick={() => deleteTask(task.id)} className="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity shrink-0 ml-4 self-start mt-2">
                        <Trash2 size={18} />
                      </button>
                    </li>
                  )})}
                </ul>
            </div>
          );

          // Shared Task Filter/Controls
          const TaskControls = () => (
             <div className="flex flex-col md:flex-row justify-between items-center bg-white p-3 rounded-xl border border-gray-100 shadow-sm gap-3">
                <div className="flex items-center gap-3 w-full md:w-auto">
                    <Filter size={16} className="text-slate-400" />
                    <select

                        onChange={e => setTaskFilter({...taskFilter, goal: e.target.value})}
                    >
                        <option value="All">All Goals</option>

                        {STRATEGIC_GOALS.map(g => <option key={g} value={g}>{g}</option>)}
                    </select>
                    <select

                        onChange={e => setTaskFilter({...taskFilter, priority: e.target.value})}
                    >
                        <option value="All">All Priorities</option>
                        <option value="High">High</option>

                </div>
                <div className="flex gap-1 bg-slate-100 p-1 rounded-lg w-full md:w-auto justify-center">
                    <button onClick={() => setTaskView('list')} className={`px-4 py-1.5 rounded-md text-sm font-medium transition-colors flex items-center gap-2 w-full justify-center ${taskView === 'list' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><List size={16}/> List</button>
                    <button onClick={() => setTaskView('kanban')} className={`px-4 py-1.5 rounded-md text-sm font-medium transition-colors flex items-center gap-2 w-full justify-center ${taskView === 'kanban' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><KanbanSquare size={16}/> Board</button>

          // --- TAB RENDERERS ---
          const renderTasks = () => (

              <TaskControls />

                <input

                    value={newTask.title} 
                    onChange={e => setNewTask({...newTask, title: e.target.value})} 
                />
                <div className="flex flex-wrap gap-3">
                  <div className="relative flex-1 min-w-[120px]">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <Clock size={14} className="text-gray-400" />
                    </div>
                    <input 
                        type="number" 
                        placeholder="Mins" 
                        className="w-full p-2 pl-9 border border-gray-200 rounded-lg focus:outline-none text-sm" 
                        value={newTask.duration} 
                        onChange={e => setNewTask({...newTask, duration: e.target.value})} 
                    />

                                      <div className="h-2 transition-all opacity-40" style={{width: `${plannedPct}%`, backgroundColor: GOAL_COLORS[stat.goal] || GOAL_COLORS['Unassigned']}}></div>
                                    </div>
                                    <div className="flex justify-between items-center text-xs text-gray-500 font-medium">
                                      <div className="flex gap-4">
                                        <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full" style={{backgroundColor: GOAL_COLORS[stat.goal] || GOAL_COLORS['Unassigned']}}></span> {stat.spentHours}h Spent</span>
                                        <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full opacity-40" style={{backgroundColor: GOAL_COLORS[stat.goal] || GOAL_COLORS['Unassigned']}}></span> {stat.plannedHours}h Planned</span>
                                      </div>
                                      {Number(stat.spentHours) > 0 && <span className="text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded font-bold">{stat.spentPctOfTotal}% of total work</span>}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          )}
                        </div>

                        {weeklyGoalTrend.length > 0 && (
                          <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm mb-4">
                            <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2 mb-6"><Activity size={20} className="text-slate-500" /> Goal Trend (Completed Hours)</h3>
                            <div className="h-80 w-full">
                              <ResponsiveContainer width="100%" height="100%">
                                <LineChart data={weeklyGoalTrend} margin={{ top: 5, right: 20, bottom: 5, left: 0 }}>
                                  <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                  <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} dy={10} />
                                  <YAxis axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} dx={-10} />
                                  <Tooltip contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} itemStyle={{fontSize: '14px', fontWeight: '500'}}/>
                                  <Legend iconType="circle" wrapperStyle={{fontSize: '12px', paddingTop: '20px'}} />
                                  {STRATEGIC_GOALS.map(goal => <Line key={goal} type="monotone" dataKey={goal} stroke={GOAL_COLORS[goal]} strokeWidth={3} dot={{r: 4, strokeWidth: 2}} activeDot={{r: 6}} /> )}
                                  <Line key="Unassigned" type="monotone" dataKey="Unassigned" stroke={GOAL_COLORS['Unassigned']} strokeWidth={2} strokeDasharray="5 5" />
                                </LineChart>
                              </ResponsiveContainer>
                            </div>
                          </div>
                        )}

                         <div className="bg-gradient-to-r from-blue-900 to-indigo-900 p-6 rounded-xl shadow-md text-white">
                            <div className="flex justify-between items-center mb-4">
                                <div>
                                    <h3 className="text-lg font-bold flex items-center gap-2"><Award size={20} className="text-yellow-400"/> Quarterly Performance Review Generator</h3>
                                    <p className="text-blue-100 text-sm mt-1">Automatically generates a self-evaluation based on your last 90 days.</p>
                                </div>
                                <button onClick={() => copyToClipboard(quarterlyReviewReport)} className="px-4 py-2 bg-white text-indigo-900 hover:bg-gray-100 rounded-lg flex items-center gap-2 font-bold text-sm transition-colors shrink-0">
                                    <Copy size={16} /> Copy Report
                                </button>
                            </div>
                            <textarea readOnly value={quarterlyReviewReport} className="w-full h-48 p-4 bg-white/10 border border-white/20 rounded-lg text-sm font-mono text-white resize-none focus:outline-none"/>
                        </div>
                    </div>
                )}

                {activeTab === 'tasks' && renderTasks()}
                {activeTab === 'direct-reports' && renderDirectReports()}
                {activeTab === 'meetings' && renderMeetings()}
                {activeTab === 'documents' && renderDocuments()}
                {activeTab === 'tools' && renderTools()}
                {activeTab === 'notes' && renderNotes()}
                {activeTab === 'team-love' && renderTeamLove()}
                {activeTab === 'weekly-summaries' && renderWeeklySummaries()}
                {activeTab === 'archive' && renderArchive()}
                {activeTab === 'settings' && renderSettings()}

              </main>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
